## cargo-deny configuration for anno
#
# Run: cargo deny check

[advisories]
ignore = [
    # No safe upgrade available (transitive).
    { id = "RUSTSEC-2025-0119", reason = "number_prefix is unmaintained; no safe upgrade is available." },
    { id = "RUSTSEC-2024-0436", reason = "paste is unmaintained; no safe upgrade is available." },
    # rand unsound advisory: only triggers with a custom logger calling
    # rand::rng() — not a pattern anno or anno-rag use. Pulled transitively
    # via lance-datagen / candle-core. No safe upgrade across the tree yet.
    { id = "RUSTSEC-2026-0097", reason = "rand::rng() unsoundness requires a custom logger path anno never exercises; transitive via lance/candle, no coordinated upgrade available." },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "ISC",
    "Zlib",
    "0BSD",
    "CC0-1.0",
    "Unicode-3.0",
]
confidence-threshold = 0.8
# Per-crate license exceptions are scoped narrowly so a future MPL-2.0 dep
# in an unrelated part of the workspace fails CI rather than silently
# inheriting the policy carve-out. MPL-2.0 is OSI-approved file-level
# copyleft: library consumption is not modification, so these crates do
# not impose copyleft on anno or its consumers.
exceptions = [
    # MPL-2.0 via the HTML-ingest chain in anno-cli:
    # anno-cli -> deformat[readability] -> dom_smoothie -> dom_query
    # -> cssparser, cssparser-macros, dtoa-short, selectors.
    # Switching anno-cli's deformat features from `readability` to `html2text`
    # would remove all four; tracked as a future option in CHANGELOG.
    { crate = "cssparser", allow = ["MPL-2.0"] },
    { crate = "cssparser-macros", allow = ["MPL-2.0"] },
    { crate = "dtoa-short", allow = ["MPL-2.0"] },
    { crate = "selectors", allow = ["MPL-2.0"] },

    # MPL-2.0 via `dirs` (cache/config directory resolution).
    { crate = "option-ext", allow = ["MPL-2.0"] },

    # Root certificate bundles use data licensing.
    { crate = "webpki-root-certs", allow = ["CDLA-Permissive-2.0"] },
    { crate = "webpki-roots", allow = ["CDLA-Permissive-2.0"] },

    # Unicode-DFS-2016 via `finl_unicode` (transitive through the
    # tokenizers / kreuzberg text-processing chain in anno-rag).
    # Unicode-DFS-2016 is the permissive Unicode data license that
    # predates Unicode-3.0 (already in `allow`); same permissive terms,
    # no copyleft. Scoped to the one crate that still ships the old SPDX id.
    { crate = "finl_unicode", allow = ["Unicode-DFS-2016"] },

    # Elastic-2.0 via `kreuzberg` (direct anno-rag dependency — document
    # extraction backend). Elastic License 2.0 is source-available, NOT
    # OSI-approved: it forbids offering the software as a managed service
    # and forbids removing license keys. anno-rag consumes kreuzberg as a
    # library inside a locally-run desktop binary — neither restriction is
    # triggered by that use. REVIEW BEFORE any SaaS/hosted offering of
    # anno-rag: a hosted multi-tenant deployment may breach ELv2 §1.
    { crate = "kreuzberg", allow = ["Elastic-2.0"] },

    # bzip2-1.0.6 is the bzip2 open-source license (BSD-style, permissive).
    # It predates SPDX and is not in the standard allow list; the license
    # text is functionally equivalent to BSD-2-Clause. Pulled transitively
    # via kreuzberg's `archives` feature (sevenz-rust2 → libbz2-rs-sys).
    { crate = "bzip2", allow = ["bzip2-1.0.6"] },
    { crate = "libbz2-rs-sys", allow = ["bzip2-1.0.6"] },
]

[licenses.private]
ignore = false
registries = []

[bans]
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
allow-workspace = false
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

# `arclabs561` is the maintainer's GitHub org. Crates pulled from there
# (e.g. local development overrides via `[patch.crates-io]`) bypass the
# `unknown-git = deny` rule. This is a deliberate supply-chain exception
# scoped to crates we own; do not extend without an explicit audit.
[sources.allow-org]
github = ["arclabs561"]
gitlab = []
bitbucket = []

