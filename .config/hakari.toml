# This file contains settings for `cargo hakari`.
# See https://docs.rs/cargo-hakari/latest/cargo_hakari/config for a full list of options.

hakari-package = "workspace-hack"

# Format version for hakari's output. Version 4 requires cargo-hakari 0.9.22 or above.
dep-format-version = "4"

# Setting workspace.resolver = "2" or higher in the root Cargo.toml is HIGHLY recommended.
# Hakari works much better with the v2 resolver. (The v2 and v3 resolvers are identical from
# hakari's perspective, so you're welcome to set either.)
#
# For more about the new feature resolver, see:
# https://blog.rust-lang.org/2021/03/25/Rust-1.51.0.html#cargos-new-feature-resolver
resolver = "2"

# Add triples corresponding to platforms commonly used by developers here.
# https://doc.rust-lang.org/rustc/platform-support.html
platforms = [
    "x86_64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
    "aarch64-pc-windows-msvc",
]

# Write out exact versions rather than a semver range. Enabled to prevent
# loose workspace-hack constraints from bypassing workspace exact pins (e.g.
# kreuzberg =4.9.7) when cargo resolves without --locked (cargo-semver-checks).
exact-versions = true

# Only traverse default features for candle crates.
# cuda/metal are opt-in features (gpu-cuda / gpu-metal Cargo features) that
# require nvcc or a Metal SDK. Including them in workspace-hack would force
# every CI runner to have those toolchains installed even for non-GPU builds.
# kreuzberg is excluded from workspace-hack: anno/anno-eval don't depend on it,
# so including it forces a kreuzberg compile during cargo-semver-checks (which
# runs without --locked and may resolve incompatible sub-crate versions).
[[traversal-rules]]
name = "kreuzberg"
type = "skip"

[[traversal-rules]]
name = "kreuzberg-pdfium-render"
type = "skip"

[[traversal-rules]]
name = "kreuzberg-tesseract"
type = "skip"

[[traversal-rules]]
name = "kreuzberg-paddle-ocr"
type = "skip"

[[traversal-rules]]
name = "candle-core"
type = "default-only"

[[traversal-rules]]
name = "candle-nn"
type = "default-only"

[[traversal-rules]]
name = "candle-transformers"
type = "default-only"
