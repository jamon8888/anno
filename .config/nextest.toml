# Nextest configuration for anno
# See: https://nexte.st/book/configuration.html

[store]
dir = "target/nextest"

# =============================================================================
# Default Profile
# =============================================================================

[profile.default]
# Retry failed tests once
retries = 1

# Mark tests as slow after 30s, terminate after 60s
slow-timeout = { period = "30s", terminate-after = 2 }

# Fail fast on first failure in CI
fail-fast = false

# Status level for output
status-level = "pass"

# =============================================================================
# CI Profile - stricter timeouts
# =============================================================================

[profile.ci]
# Avoid re-running expensive timeouts: if it times out once, it almost always
# times out again (and retries multiply CI energy/time).
retries = 0
slow-timeout = { period = "60s", terminate-after = 2 }
fail-fast = true
status-level = "all"

# =============================================================================
# Quick Profile - fast tests only
# =============================================================================

[profile.quick]
retries = 0
slow-timeout = { period = "10s", terminate-after = 1 }

# Filter out slow tests: property tests, eval harness, flaky/slow binaries.
# NOTE: nextest `test(/.../)` matches the test name; for integration tests, that name
# often does not include the filename/module. Excluding by `binary(...)` is more robust.
default-filter = "not test(/property/) and not test(/proptest/) and not test(/eval::/) and not test(/eval.*harness/) and not test(/backend_availability_matrix/) and not binary(offset_fuzz_tests) and not binary(randomized_matrix_ci) and not binary(combiner_variance) and not binary(e2e_cli_workflows) and not binary(e2e_backend_scenarios) and not binary(e2e_eval_workflow) and not binary(e2e_full_pipeline) and not binary(compare_command) and not binary(cli_context_output) and not binary(backend_factory_parity) and not binary(backend_integration) and not binary(candle_ner_regression) and not binary(eval_integration)"

# =============================================================================
# ML Profile - for ML backend tests
# =============================================================================

[profile.ml]
# ML tests are slow due to model loading
retries = 1
slow-timeout = { period = "180s", terminate-after = 3 }

# Limit parallelism to avoid OOM with multiple models
test-threads = 2

# =============================================================================
# Property Test Profile
# =============================================================================

[profile.property]
retries = 0
slow-timeout = { period = "120s", terminate-after = 2 }
test-threads = 4

# Only run property/fuzz tests
default-filter = "test(/property/) or test(/fuzz/) or test(/proptest/)"
