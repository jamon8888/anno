[build]
rustflags = ["--cap-lints", "allow"]
rustdocflags = ["--cap-lints", "allow"]
# target-dir is intentionally NOT set here — it is machine-specific.
# Local dev: set CARGO_TARGET_DIR in your shell profile or .env.
# E.g. on the dev machine: CARGO_TARGET_DIR=E:\cargo-target (external SSD).

# Windows MSVC: keep Rust and cc-rs/CMake dependencies on the dynamic CRT.
# ORT/Kreuzberg/Tesseract resolve against /MD; forcing +crt-static (/MT)
# causes LNK2038 RuntimeLibrary mismatches. Do not suppress libcmt with
# /NODEFAULTLIB here: cargo-dist --print=linkage builds transient DLLs that
# require the default CRT startup symbols.
# NOTE: linker = "lld-link" and target-cpu=native are local-only overrides;
# set them in $CARGO_HOME/config.toml on your dev machine, not here.
[target.x86_64-pc-windows-msvc]
rustflags = ["--cap-lints", "allow", "-C", "target-feature=-crt-static"]

[env]
CFLAGS_x86_64-pc-windows-msvc = "/MD"
CFLAGS_x86_64_pc_windows_msvc = "/MD"
CXXFLAGS_x86_64-pc-windows-msvc = "/MD"
CXXFLAGS_x86_64_pc_windows_msvc = "/MD"
# sccache and incremental compilation are mutually exclusive.
# Disable incremental globally so sccache lookups are always valid.
CARGO_INCREMENTAL = "0"
