# Managed by repository-settings/app
# https://github.com/repository-settings/app

repository:
  description: "Text annotation and entity extraction"
  homepage: "https://docs.rs/anno"
  private: false
  has_issues: true
  has_wiki: false
  has_downloads: true
  default_branch: main
  # Squash disabled to preserve atomic commit history.
  allow_squash_merge: false
  allow_merge_commit: true
  allow_rebase_merge: true
  delete_branch_on_merge: true

  topics:
    - information-extraction
    - coreference-resolution
    - ner
    - nlp
    - pii-detection
    - relation-extraction

branches:
  - name: main
    protection:
      required_pull_request_reviews: null
      required_status_checks:
        strict: true
        contexts:
          - "Check"
          - "Format"
          - "Clippy"
          - "Test (ubuntu-latest)"
          - "Test (minimal)"
          - "Docs"
      # Admins can bypass for emergency overrides (GitHub Actions outages, etc).
      enforce_admins: false
      restrictions: null
