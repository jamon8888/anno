name: publish

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'publish' to publish to crates.io"
        required: true
        default: "dry-run"

permissions:
  contents: read
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - name: Guard (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ inputs.confirm }}" != "publish" ]; then
            echo "Refusing to publish: set workflow input confirm=publish"
            exit 1
          fi

      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Authenticate (Trusted Publishing)
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      # Publish bottom-up by dep order:
      # anno-core -> anno-metrics -> anno-graph -> anno -> anno-eval -> anno-cli
      #
      # Each step is idempotent: if a crate is already published at the current
      # version, cargo's "crate version X is already uploaded" response is treated
      # as success and the step moves on. Any other failure aborts the workflow.
      - name: cargo publish (anno-core)
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: ./.github/workflows/publish-crate.sh anno-core

      - name: cargo publish (anno-metrics)
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: ./.github/workflows/publish-crate.sh anno-metrics

      - name: cargo publish (anno-graph)
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: ./.github/workflows/publish-crate.sh anno-graph

      - name: cargo publish (anno)
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: ./.github/workflows/publish-crate.sh anno

      - name: cargo publish (anno-eval)
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: ./.github/workflows/publish-crate.sh anno-eval

      - name: cargo publish (anno-cli)
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: ./.github/workflows/publish-crate.sh anno-cli
