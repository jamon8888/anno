name: publish

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'publish' to publish to crates.io"
        required: true
        default: "dry-run"

permissions:
  contents: read
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - name: Guard (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ inputs.confirm }}" != "publish" ]; then
            echo "Refusing to publish: set workflow input confirm=publish"
            exit 1
          fi

      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Authenticate (Trusted Publishing)
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      # Publish bottom-up: anno-core -> anno-metrics -> anno-lib -> anno
      - name: cargo publish (anno-core)
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish -p anno-core --allow-dirty

      - name: Wait for crates.io index
        run: sleep 30

      - name: cargo publish (anno-metrics)
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish -p anno-metrics --allow-dirty

      - name: Wait for crates.io index
        run: sleep 30

      - name: cargo publish (anno-lib)
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish -p anno-lib --allow-dirty

      - name: Wait for crates.io index
        run: sleep 30

      - name: cargo publish (anno)
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish -p anno --allow-dirty
