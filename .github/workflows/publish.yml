name: publish

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      crate:
        description: "Crate to publish"
        required: true
        type: choice
        options:
          - anno
      confirm:
        description: "Type 'publish' to publish to crates.io"
        required: true
        default: "dry-run"

permissions:
  contents: read
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - name: Guard (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ inputs.confirm }}" != "publish" ]; then
            echo "Refusing to publish: set workflow input confirm=publish"
            exit 1
          fi

      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Determine crate
        id: crate
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "name=anno" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ inputs.crate }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate (Trusted Publishing)
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: cargo publish (${{ steps.crate.outputs.name }})
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish -p ${{ steps.crate.outputs.name }} --allow-dirty
