name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened, ready_for_review, labeled]
  workflow_dispatch:
    inputs:
      max_examples:
        description: "Maximum examples for full evaluation runs"
        required: false
        type: string
# Supersede in-progress runs for the same ref: a new push to a PR cancels
# the previous, still-running CI instead of piling up overlapping matrices.
# `main`/tag runs use a per-SHA group so they never cancel each other.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true
env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: sccache
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NODE_OPTIONS: "--no-deprecation"
  GIT_CONFIG_COUNT: "1"
  GIT_CONFIG_KEY_0: init.defaultBranch
  GIT_CONFIG_VALUE_0: main
  CARGO_INCREMENTAL: "0"
  CARGO_PROFILE_DEV_DEBUG: "0"
  CARGO_PROFILE_DEV_SPLIT_DEBUGINFO: "off"
  CARGO_PROFILE_TEST_DEBUG: "0"
  CARGO_PROFILE_TEST_SPLIT_DEBUGINFO: "off"
  # sccache-action v0.0.10: fixes LD_LIBRARY_PATH crash + uses Node 24
permissions:
  contents: read
  checks: write
  issues: write
  security-events: write
  id-token: write

# Pull requests run a small gate by default to avoid exhausting GitHub Actions
# minutes. Add the `full-ci` label, push to main, or run workflow_dispatch for
# the expensive backend, platform, eval, and static-analysis matrices.
jobs:
  # ==========================================================================
  # Quick checks (fast feedback) - runs in parallel
  # ==========================================================================
  docs-audit:
    name: Docs audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Docs hygiene checks (fast, offline)
        run: python3 scripts/docs_audit.py
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10
        with:
          version: "v0.15.0"
      - uses: Swatinem/rust-cache@v2.8.2
      - run: cargo check --workspace --all-targets
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10
        with:
          version: "v0.15.0"
      - uses: Swatinem/rust-cache@v2.8.2
      - run: cargo fmt --all -- --check
  typecheck-python:
    name: Typecheck (Python / ty)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: ty.toml
      - name: Run ty
        run: uvx ty check scripts/docs_audit.py scripts/apply_registry_enrichment.py
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10
        with:
          version: "v0.15.0"
      - uses: Swatinem/rust-cache@v2.8.2
      # All targets (lib + tests + bins + examples) so test code is also linted.
      - run: cargo clippy --workspace --all-targets --features "eval discourse" -- -D warnings
  # ------------------------------------------------------------
  # Clippy runs across feature combos that the default CI step
  # doesn't exercise. Each combo is a separate job so a failure
  # names the feature set directly.
  # ------------------------------------------------------------
  # Clippy on feature combos the primary (eval discourse) job doesn't cover.
  # Scoped to lib + unit tests; integration tests live under the main job.
  clippy-extra:
    name: Clippy (${{ matrix.features }})
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'full-ci')
    strategy:
      fail-fast: false
      matrix:
        features:
          - "analysis"
          - "schema"
          - "candle"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10
        with:
          version: "v0.15.0"
      - uses: Swatinem/rust-cache@v2.8.2
      - run: cargo clippy -p anno --lib --features "${{ matrix.features }}" -- -D warnings
  # ==========================================================================
  # Unit tests - no features (zero-dependency baseline)
  # ==========================================================================
  test-minimal:
    name: Test (minimal)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10
        with:
          version: "v0.15.0"
      - uses: Swatinem/rust-cache@v2.8.2
      - run: cargo test --package anno --no-default-features --lib
      - run: cargo test --package anno --lib
  # ==========================================================================
  # Evaluation framework tests
  # ==========================================================================
  test-eval:
    name: Test (eval)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'full-ci')
    steps:
      - uses: actions/checkout@v6
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
            "$AGENT_TOOLSDIRECTORY" || true
          df -h
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10
        with:
          version: "v0.15.0"
      - uses: Swatinem/rust-cache@v2.8.2
      - name: Set ANNO cache dir and eval history path (matches actions/cache)
        run: |
          echo "ANNO_CACHE_DIR=$HOME/.anno_cache" >> "$GITHUB_ENV"
          echo "ANNO_EVAL_HISTORY=$HOME/.anno_cache/eval-results.jsonl" >> "$GITHUB_ENV"
      # Optional: enable S3 dataset cache via AWS OIDC (no long-lived secrets).
      # Configure the role ARN as a repo variable: Settings -> Secrets and variables -> Actions -> Variables.
      - name: Configure AWS credentials (OIDC) for dataset cache
        if: ${{ vars.ANNO_AWS_ROLE_ARN != '' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.ANNO_AWS_ROLE_ARN }}
          aws-region: ${{ vars.ANNO_AWS_REGION != '' && vars.ANNO_AWS_REGION || 'us-east-1' }}
      # Note: we intentionally do not support access-key secrets here.
      # GitHub Actions expressions in `if:` do not allow `secrets.*` (workflow won't parse).
      - name: Enable S3 dataset cache (when AWS is configured)
        if: ${{ vars.ANNO_AWS_ROLE_ARN != '' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
        run: |
          echo "ANNO_S3_CACHE=1" >> "$GITHUB_ENV"
          echo "ANNO_S3_BUCKET=${{ vars.ANNO_S3_BUCKET != '' && vars.ANNO_S3_BUCKET || 'arc-anno-data' }}" >> "$GITHUB_ENV"
      - name: Verify AWS CLI available (S3 cache)
        if: ${{ vars.ANNO_AWS_ROLE_ARN != '' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
        run: aws --version
      - name: Cache datasets
        uses: actions/cache@v5
        with:
          path: ~/.anno_cache
          key: anno-datasets-${{ runner.os }}-v3-${{ github.run_id }}
          restore-keys: |
            anno-datasets-${{ runner.os }}-v3-
      - name: Build with eval features
        run: cargo build --workspace --features eval
      # Skip long-running matrix harness test (runs in matrix-test job with onnx).
      - name: Run library tests
        run: cargo test --workspace --lib --features "eval discourse" -- --skip test_randomized_matrix_sample
      - name: Run integration tests
        run: cargo test --package anno --tests --features "discourse bundled-crf-weights bundled-hmm-params"
      - name: Run doc tests
        run: cargo test -p anno --doc --features discourse
  # ==========================================================================
  # Cross-platform tests (core features only)
  # ==========================================================================
  test-cross-platform:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'full-ci')
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - name: Free disk space
        if: runner.os == 'Linux'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
            "$AGENT_TOOLSDIRECTORY" || true
          sudo apt-get clean
          df -h
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10
        with:
          version: "v0.15.0"
      - uses: Swatinem/rust-cache@v2.8.2
        with:
          key: ${{ matrix.os }}
      # MSVC CRT alignment: anno-rag pulls anno/gliner2-fastino -> onnx -> ort,
      # which links ort_sys (built /MD, dynamic CRT). esaxx-rs (via tokenizers)
      # builds its C++ with cc-rs defaulting to /MT (static CRT) -> LNK2038
      # RuntimeLibrary mismatch. Force the whole Windows build onto the dynamic
      # CRT: -crt-static off for rustc, -MD for cc-rs C/C++ compilation.
      # See docs/superpowers/plans/2026-05-04-gliner2-fastino-finalization.md F1.2.
      - name: Align MSVC CRT (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          echo "RUSTFLAGS=-C target-feature=-crt-static" >> "$GITHUB_ENV"
          echo "CFLAGS_x86_64-pc-windows-msvc=-MD" >> "$GITHUB_ENV"
          echo "CXXFLAGS_x86_64-pc-windows-msvc=-MD" >> "$GITHUB_ENV"
      # `anno-cli` requires at least one HTML extractor feature.
      # `extractor-html2text` is the lighter (no-MPL) option.
      - name: Build
        run: cargo build --workspace --no-default-features --features anno-cli/extractor-html2text
      - name: Test
        run: cargo test --workspace --no-default-features --features anno-cli/extractor-html2text --lib
  # ==========================================================================
  # ONNX backend tests (Linux only)
  # ==========================================================================
  test-onnx:
    name: Test (ONNX backend)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'full-ci')
    steps:
      - uses: actions/checkout@v6
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
            "$AGENT_TOOLSDIRECTORY" || true
          sudo apt-get clean
          df -h
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10
        with:
          version: "v0.15.0"
      - uses: Swatinem/rust-cache@v2.8.2
      - name: Cache HF models
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ runner.os }}-v2
          restore-keys: |
            hf-models-${{ runner.os }}-
      - name: Build ONNX backend
        run: cargo build --workspace --features onnx
      - name: Test ONNX (unit)
        run: cargo test --workspace --lib --features onnx
  # ==========================================================================
  # Candle backend tests (pure Rust)
  # ==========================================================================
  test-candle:
    name: Test (Candle backend)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'full-ci')
    steps:
      - uses: actions/checkout@v6
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
            "$AGENT_TOOLSDIRECTORY" || true
          sudo apt-get clean
          df -h
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10
        with:
          version: "v0.15.0"
      - uses: Swatinem/rust-cache@v2.8.2
      - name: Cache HF models
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ runner.os }}-v2
          restore-keys: |
            hf-models-${{ runner.os }}-
      - name: Build Candle backend
        run: cargo build --workspace --features candle
      - name: Test Candle (unit)
        run: cargo test --workspace --lib --features candle
  # ==========================================================================
  # Feature Combination Tests (important combos not covered above)
  # ==========================================================================
  test-onnx-eval:
    name: Test (ONNX + eval)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'full-ci')
    steps:
      - uses: actions/checkout@v6
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
            "$AGENT_TOOLSDIRECTORY" || true
          df -h
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10
        with:
          version: "v0.15.0"
      - uses: Swatinem/rust-cache@v2.8.2
      - name: Cache HF models
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ runner.os }}-v2
      - name: Build
        run: cargo build --workspace --features "onnx,eval,discourse"
      - name: Test
        run: cargo test --workspace --lib --features "onnx,eval,discourse"
  test-candle-eval:
    name: Test (Candle + eval)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'full-ci')
    steps:
      - uses: actions/checkout@v6
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
            "$AGENT_TOOLSDIRECTORY" || true
          df -h
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10
        with:
          version: "v0.15.0"
      - uses: Swatinem/rust-cache@v2.8.2
      - name: Cache HF models
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ runner.os }}-v2
      - name: Build
        run: cargo build --workspace --features "candle,eval,discourse"
      - name: Test
        run: cargo test --workspace --lib --features "candle,eval,discourse"
  # ==========================================================================
  # OCR + PaddleOCR feature compilation check
  # ==========================================================================
  check-ocr-paddle:
    name: Check (embedded-ocr + ocr-paddle)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'full-ci')
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2.8.2
      - name: Check OCR + PaddleOCR features compile
        run: cargo check -p anno-rag --features "embedded-ocr,ocr-paddle"
      - name: Check anno-rag-bin with OCR features
        run: cargo check -p anno-rag-bin --features "embedded-ocr,ocr-paddle"
  test-production:
    name: Test (production features)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'full-ci')
    steps:
      - uses: actions/checkout@v6
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
            "$AGENT_TOOLSDIRECTORY" || true
          sudo apt-get clean
          df -h
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10
        with:
          version: "v0.15.0"
      - uses: Swatinem/rust-cache@v2.8.2
      - name: Cache HF models
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ runner.os }}-v2
      - name: Build production
        run: cargo build --workspace --features "production"
      - name: Test production
        run: cargo test --workspace --lib --features "production"
  # ==========================================================================
  # Minimal build (no-default-features)
  # ==========================================================================
  # The declared `rust-version = "1.88"` cannot be tested on x86_64 because
  # the `innr` 0.2.x transitive dep uses avx512 intrinsics that require a
  # newer stable compiler. This job approximates the declared MSRV by
  # verifying the workspace compiles without default features on current
  # stable -- it catches feature-gate regressions without resolving the
  # avx512 incompatibility.
  minimal-build:
    name: Minimal build (no-default-features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10
        with:
          version: "v0.15.0"
      - uses: Swatinem/rust-cache@v2.8.2
      # `anno-cli` requires at least one HTML-extractor feature; the
      # MPL-free `extractor-html2text` is the lightest option that satisfies
      # that constraint and proves the no-default-features build still works.
      - run: cargo check --workspace --no-default-features --features anno-cli/extractor-html2text
  # ==========================================================================
  # Documentation
  # ==========================================================================
  docs:
    name: Docs
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'full-ci')
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10
        with:
          version: "v0.15.0"
      - uses: Swatinem/rust-cache@v2.8.2
      # Document the library crates. anno is doc'd twice with different feature
      # combinations to surface feature-gated link errors that single-feature
      # builds miss.
      - run: cargo doc -p anno -p anno-eval --no-deps --features eval
        env:
          RUSTDOCFLAGS: -D warnings
      - run: cargo doc -p anno --no-deps --features discourse
        env:
          RUSTDOCFLAGS: -D warnings
  # ==========================================================================
  # Property tests (proptest)
  # ==========================================================================
  proptest:
    name: Property Tests
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'full-ci')
    steps:
      - uses: actions/checkout@v6
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
            "$AGENT_TOOLSDIRECTORY" || true
          sudo apt-get clean
          df -h
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10
        with:
          version: "v0.15.0"
      - uses: Swatinem/rust-cache@v2.8.2
      - name: Run property tests
        run: cargo test --workspace --lib --features "eval discourse" -- proptest
        env:
          PROPTEST_CASES: 100
  # ==========================================================================
  # Randomized Matrix Test (backends x datasets x tasks)
  # ==========================================================================
  matrix-test:
    name: Randomized Matrix Test
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'full-ci')
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10
        with:
          version: "v0.15.0"
      - uses: Swatinem/rust-cache@v2.8.2
      - name: Set ANNO cache dir and eval history path (matches actions/cache)
        run: |
          echo "ANNO_CACHE_DIR=$HOME/.anno_cache" >> "$GITHUB_ENV"
          echo "ANNO_EVAL_HISTORY=$HOME/.anno_cache/eval-results.jsonl" >> "$GITHUB_ENV"
      - name: Configure AWS credentials (OIDC) for dataset cache
        if: ${{ vars.ANNO_AWS_ROLE_ARN != '' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.ANNO_AWS_ROLE_ARN }}
          aws-region: ${{ vars.ANNO_AWS_REGION != '' && vars.ANNO_AWS_REGION || 'us-east-1' }}
      - name: Enable S3 dataset cache (when AWS is configured)
        if: ${{ vars.ANNO_AWS_ROLE_ARN != '' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
        run: |
          echo "ANNO_S3_CACHE=1" >> "$GITHUB_ENV"
          echo "ANNO_S3_BUCKET=${{ vars.ANNO_S3_BUCKET != '' && vars.ANNO_S3_BUCKET || 'arc-anno-data' }}" >> "$GITHUB_ENV"
      - name: Verify AWS CLI available (S3 cache)
        if: ${{ vars.ANNO_AWS_ROLE_ARN != '' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
        run: aws --version
      - name: Cache HF models
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ runner.os }}-v2
          restore-keys: |
            hf-models-${{ runner.os }}-
      - name: Cache datasets
        uses: actions/cache@v5
        with:
          path: ~/.anno_cache
          key: anno-datasets-${{ runner.os }}-v3-${{ github.run_id }}
          restore-keys: |
            anno-datasets-${{ runner.os }}-v3-
      # Muxer history + eval history in their own cache lineage so MAB learning and
      # dataset observation counts are never overwritten by test-eval/eval-sanity writes.
      - name: Cache muxer state and eval history (persistent MAB learning)
        uses: actions/cache@v5
        with:
          path: |
            ~/.anno_cache/muxer_history.*.json
            ~/.anno_cache/linucb_global_state.json
            ~/.anno_cache/eval-results.jsonl
            ~/.anno_cache/eval-history.db
          key: anno-muxer-${{ runner.os }}-v1-${{ github.run_id }}
          restore-keys: |
            anno-muxer-${{ runner.os }}-v1-
      - name: Build matrix sampler harness (enable ML backends)
        run: cargo build -p anno-eval --features "onnx,eval,discourse"
      - name: Run randomized matrix test (NER)
        run: cargo test -p anno-eval --lib --features "onnx,eval,discourse" test_randomized_matrix_sample -- --nocapture
        env:
          ANNO_MATRIX_PERSPECTIVE: ner
          ANNO_SAMPLE_STRATEGY: random
          ANNO_CI_SEED: ${{ github.run_id }}
          ANNO_ML_IN_MATRIX: "1"
          ANNO_MATRIX_TRY_DOWNLOAD_ON_EMPTY: "1"
          # Prefer cache in PRs, but fall back to downloads if empty.
          ANNO_MATRIX_REQUIRE_CACHED: ${{ github.event_name == 'pull_request' && '1' || '0' }}
          # Keep downloads bounded if enabled.
          ANNO_MAX_DOWNLOAD_BYTES: 8000000
      - name: Run randomized matrix test (RE)
        run: cargo test -p anno-eval --lib --features "onnx,eval,discourse" test_randomized_matrix_sample -- --nocapture
        env:
          ANNO_MATRIX_PERSPECTIVE: re
          ANNO_SAMPLE_STRATEGY: random
          ANNO_CI_SEED: ${{ github.run_id }}
          ANNO_ML_IN_MATRIX: "1"
          ANNO_MATRIX_TRY_DOWNLOAD_ON_EMPTY: "1"
          ANNO_MATRIX_REQUIRE_CACHED: ${{ github.event_name == 'pull_request' && '1' || '0' }}
          ANNO_MAX_DOWNLOAD_BYTES: 8000000
      - name: Run randomized matrix test (Coref)
        run: cargo test -p anno-eval --lib --features "onnx,eval,discourse" test_randomized_matrix_sample -- --nocapture
        env:
          ANNO_MATRIX_PERSPECTIVE: coref
          ANNO_SAMPLE_STRATEGY: random
          ANNO_CI_SEED: ${{ github.run_id }}
          ANNO_ML_IN_MATRIX: "1"
          ANNO_MATRIX_TRY_DOWNLOAD_ON_EMPTY: "1"
          ANNO_MATRIX_REQUIRE_CACHED: ${{ github.event_name == 'pull_request' && '1' || '0' }}
          ANNO_MAX_DOWNLOAD_BYTES: 8000000
      - name: Run randomized matrix test (Temporal)
        run: cargo test -p anno-eval --lib --features "onnx,eval,discourse" test_randomized_matrix_sample -- --nocapture
        env:
          ANNO_MATRIX_PERSPECTIVE: temporal
          ANNO_SAMPLE_STRATEGY: random
          ANNO_CI_SEED: ${{ github.run_id }}
          ANNO_ML_IN_MATRIX: "1"
          ANNO_MATRIX_TRY_DOWNLOAD_ON_EMPTY: "1"
          ANNO_MATRIX_REQUIRE_CACHED: ${{ github.event_name == 'pull_request' && '1' || '0' }}
          ANNO_MAX_DOWNLOAD_BYTES: 8000000
      - name: Run worst-first matrix test (+ regression detection)
        run: |
          cargo test -p anno-eval --lib --features "onnx,eval,discourse" test_randomized_matrix_sample -- --nocapture
        env:
          ANNO_SAMPLE_STRATEGY: worst-first
          ANNO_CI_SEED: ${{ github.run_id }}
          ANNO_ML_IN_MATRIX: "1"
          ANNO_MATRIX_TRY_DOWNLOAD_ON_EMPTY: "1"
          ANNO_MATRIX_REQUIRE_CACHED: ${{ github.event_name == 'pull_request' && '1' || '0' }}
          ANNO_MAX_DOWNLOAD_BYTES: 8000000
          # Enable regression detection (emits warnings when Cohen's d >= 2.0 over 20+ obs).
          # Non-fatal: fires on stderr, does not fail the job.
          ANNO_CHECK_REGRESSIONS: "1"
  # ==========================================================================
  # F1 Unit Tests (evaluator math invariants)
  # Note: actual eval-history regression detection runs in matrix-test (worst-first step,
  # ANNO_CHECK_REGRESSIONS=1) once sufficient history has accumulated (>=20 obs per cell).
  # ==========================================================================
  regression:
    name: F1 Evaluator Unit Tests
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'full-ci')
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10
        with:
          version: "v0.15.0"
      - uses: Swatinem/rust-cache@v2.8.2
      - name: Run evaluator unit tests
        run: cargo test -p anno-eval --lib --features "eval discourse" test_comprehensive_eval_results_average_f1 -- --nocapture
  # ==========================================================================
  # Examples (compile check)
  # ==========================================================================
  examples:
    name: Examples (build)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'full-ci')
    steps:
      - uses: actions/checkout@v6
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
            "$AGENT_TOOLSDIRECTORY" || true
          sudo apt-get clean
          df -h
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10
        with:
          version: "v0.15.0"
      - uses: Swatinem/rust-cache@v2.8.2
      - name: Build examples (eval + discourse)
        run: cargo build --workspace --examples --features "eval discourse"
      - name: Build examples (onnx)
        run: cargo build -p anno --examples --features "onnx"
      - name: Run muxer decision-loop example (offline smoke)
        run: cargo run -p anno-eval --example muxer_decision_loop --features "eval discourse"
  # ==========================================================================
  # Sanity Check Evaluations (small random samples on push)
  # ==========================================================================
  eval-sanity:
    name: Eval Sanity (small samples)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'full-ci')
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
            "$AGENT_TOOLSDIRECTORY" || true
          sudo apt-get clean
          df -h
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10
        with:
          version: "v0.15.0"
      - uses: Swatinem/rust-cache@v2.8.2
      - name: Set ANNO cache dir and eval history path (matches actions/cache)
        run: |
          echo "ANNO_CACHE_DIR=$HOME/.anno_cache" >> "$GITHUB_ENV"
          echo "ANNO_EVAL_HISTORY=$HOME/.anno_cache/eval-results.jsonl" >> "$GITHUB_ENV"
      - name: Configure AWS credentials (OIDC) for dataset cache
        if: ${{ vars.ANNO_AWS_ROLE_ARN != '' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.ANNO_AWS_ROLE_ARN }}
          aws-region: ${{ vars.ANNO_AWS_REGION != '' && vars.ANNO_AWS_REGION || 'us-east-1' }}
      - name: Enable S3 dataset cache (when AWS is configured)
        if: ${{ vars.ANNO_AWS_ROLE_ARN != '' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
        run: |
          echo "ANNO_S3_CACHE=1" >> "$GITHUB_ENV"
          echo "ANNO_S3_BUCKET=${{ vars.ANNO_S3_BUCKET != '' && vars.ANNO_S3_BUCKET || 'arc-anno-data' }}" >> "$GITHUB_ENV"
      - name: Verify AWS CLI available (S3 cache)
        if: ${{ vars.ANNO_AWS_ROLE_ARN != '' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
        run: aws --version
      - name: Cache HF models
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ runner.os }}-v2
          restore-keys: |
            hf-models-${{ runner.os }}-
      - name: Cache datasets
        uses: actions/cache@v5
        with:
          path: ~/.anno_cache
          key: anno-datasets-${{ runner.os }}-v3-${{ github.run_id }}
          restore-keys: |
            anno-datasets-${{ runner.os }}-v3-
      # Restore eval history so CLI benchmark accumulates observation counts across runs.
      # Uses the same anno-muxer key family as matrix-test to share state.
      - name: Cache eval history (persistent observation counts)
        uses: actions/cache@v5
        with:
          path: |
            ~/.anno_cache/eval-results.jsonl
            ~/.anno_cache/eval-history.db
          key: anno-muxer-${{ runner.os }}-v1-${{ github.run_id }}
          restore-keys: |
            anno-muxer-${{ runner.os }}-v1-
      - name: Run sanity check evaluations
        run: ./scripts/eval-sanity.sh
        env:
          MAX_EXAMPLES: 20
          RANDOM_SEED: 42
          # Note: cli feature is included in eval via script
      - name: Ensure sanity report exists
        if: always()
        run: |
          mkdir -p reports
          if [ ! -f reports/eval-sanity-report.md ]; then
            printf '%s\n' \
              '# Eval sanity report' \
              '' \
              '_Report was not generated by the script; see job logs._' \
              > reports/eval-sanity-report.md
          fi
      - name: Upload sanity report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: eval-sanity-report
          path: reports/eval-sanity-report.md
          if-no-files-found: error
  # ==========================================================================
  # Full Evaluations (only on eval-* branches or manual trigger)
  # ==========================================================================
  eval-full:
    name: Eval Full (all combinations)
    runs-on: ubuntu-latest
    if: |
      startsWith(github.ref, 'refs/heads/eval-') ||
      github.event_name == 'workflow_dispatch'
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10
        with:
          version: "v0.15.0"
      - uses: Swatinem/rust-cache@v2.8.2
      - name: Set ANNO cache dir and eval history path (matches actions/cache)
        run: |
          echo "ANNO_CACHE_DIR=$HOME/.anno_cache" >> "$GITHUB_ENV"
          echo "ANNO_EVAL_HISTORY=$HOME/.anno_cache/eval-results.jsonl" >> "$GITHUB_ENV"
      - name: Configure AWS credentials (OIDC) for dataset cache
        if: ${{ vars.ANNO_AWS_ROLE_ARN != '' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/eval-')) }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.ANNO_AWS_ROLE_ARN }}
          aws-region: ${{ vars.ANNO_AWS_REGION != '' && vars.ANNO_AWS_REGION || 'us-east-1' }}
      - name: Enable S3 dataset cache (when AWS is configured)
        if: ${{ vars.ANNO_AWS_ROLE_ARN != '' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/eval-')) }}
        run: |
          echo "ANNO_S3_CACHE=1" >> "$GITHUB_ENV"
          echo "ANNO_S3_BUCKET=${{ vars.ANNO_S3_BUCKET != '' && vars.ANNO_S3_BUCKET || 'arc-anno-data' }}" >> "$GITHUB_ENV"
      - name: Verify AWS CLI available (S3 cache)
        if: ${{ vars.ANNO_AWS_ROLE_ARN != '' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/eval-')) }}
        run: aws --version
      - name: Cache HF models
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ runner.os }}-v2
          restore-keys: |
            hf-models-${{ runner.os }}-
      - name: Cache datasets
        uses: actions/cache@v5
        with:
          path: ~/.anno_cache
          key: anno-datasets-${{ runner.os }}-v3-${{ github.run_id }}
          restore-keys: |
            anno-datasets-${{ runner.os }}-v3-
      # Restore eval history so full evals seed from accumulated observation counts.
      - name: Cache eval history (persistent observation counts)
        uses: actions/cache@v5
        with:
          path: |
            ~/.anno_cache/eval-results.jsonl
            ~/.anno_cache/eval-history.db
          key: anno-muxer-${{ runner.os }}-v1-${{ github.run_id }}
          restore-keys: |
            anno-muxer-${{ runner.os }}-v1-
      - name: Run full evaluations
        run: ./scripts/eval-full.sh
        env:
          MAX_EXAMPLES: ${{ inputs.max_examples || '' }}
      - name: Upload full report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: eval-full-report
          path: eval-full-report.md
  # ==========================================================================
  # Security audit (cargo-audit)
  # ==========================================================================
  audit:
    name: Security Audit (cargo-audit)
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: ""
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      # Library crates gitignore Cargo.lock; generate one for the audit scan.
      - run: cargo generate-lockfile
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Unmaintained crate policy lives in deny.toml. This job is the
          # blocking RustSec vulnerability gate.

  semver-checks:
    name: Cargo Semver Checks
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'full-ci')
    # Non-blocking while we baseline; promote to required once it's been
    # green for one release cycle.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          # cargo-semver-checks compares against the previous published
          # release; needs full history to find the baseline.
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10
        with:
          version: "v0.15.0"
      - uses: Swatinem/rust-cache@v2.8.2
      - uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          # `cuda` feature requires nvcc which Linux runners don't have;
          # `--all-features` is unbuildable. Per-crate default-features only.
          feature-group: only-explicit-features
          features: ""
          package: anno,anno-eval
  # ==========================================================================
  # Static Analysis Tools
  # ==========================================================================

  # Comprehensive dependency linting. Run on the normal Ubuntu Rust toolchain
  # instead of cargo-deny's Docker action; the Docker image uses a musl host
  # that breaks cargo metadata with the pinned Rust 1.95 toolchain.
  cargo-deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: ""
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.95
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny@0.19.8
          fallback: none
      - run: cargo deny --all-features check
  # ==========================================================================
  # Publish Validation (best-effort; expected to fail while publishing is paused)
  # ==========================================================================
  publish-validation:
    name: Publish Validation
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'full-ci')
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10
        with:
          version: "v0.15.0"
      - uses: Swatinem/rust-cache@v2.8.2
      - name: Validate workspace structure
        run: |
          echo "## Workspace Structure Validation" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cargo metadata --format-version 1 | jq -r '.workspace_members[]' | sort >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
      - name: Check publish readiness (anno)
        id: anno
        run: |
          echo "Checking anno publish readiness (best-effort)..."
          if cargo publish --dry-run -p anno; then
            echo "status=ready" >> $GITHUB_OUTPUT
            echo "[ok] anno: Ready to publish" >> $GITHUB_STEP_SUMMARY
          else
            echo "status=error" >> $GITHUB_OUTPUT
            echo "[error] anno: Publish validation failed (expected while publishing is paused)" >> $GITHUB_STEP_SUMMARY
          fi
      - name: Check crates.io status
        run: |
          echo "## Crates.io Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for crate in anno; do
            if curl -s "https://crates.io/api/v1/crates/$crate" 2>/dev/null | jq -r '.crate | "\(.name): v\(.max_version // "not published")"' 2>/dev/null; then
              echo "- **$crate**: Published" >> $GITHUB_STEP_SUMMARY
            else
              echo "- **$crate**: Not published" >> $GITHUB_STEP_SUMMARY
            fi
          done
      - name: Generate publish status report
        run: |
          cat > publish-validation-report.md << EOF
          # Publish Validation Report

          Generated: $(date -u +"%Y-%m-%d %H:%M:%S UTC")

          ## Publish Readiness Status

          ### anno
          $([ "${{ steps.anno.outputs.status }}" == "ready" ] && echo "[ok] **Ready to publish**" || echo "[error] **Publish validation failed**")

          ## Next Steps

          See \`docs/PUBLISH_STATUS.md\` for detailed information and fixes.
          EOF
      - name: Upload publish validation report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: publish-validation-report
          path: publish-validation-report.md
