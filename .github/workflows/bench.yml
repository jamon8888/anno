name: bench
on:
  pull_request:
    paths:
      - 'crates/anno-rag/**'
      - '.github/workflows/bench.yml'

jobs:
  bench:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      # anno-rag -> anno/gliner2-fastino -> onnx -> ort_sys (/MD) vs esaxx-rs
      # (/MT default) causes an MSVC LNK2038 RuntimeLibrary mismatch. Force the
      # dynamic CRT for rustc + cc-rs on Windows.
      - name: Align MSVC CRT (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          echo "RUSTFLAGS=-C target-feature=-crt-static" >> "$GITHUB_ENV"
          echo "CFLAGS_x86_64-pc-windows-msvc=-MD" >> "$GITHUB_ENV"
          echo "CXXFLAGS_x86_64-pc-windows-msvc=-MD" >> "$GITHUB_ENV"
      - name: Run benches
        run: cargo bench -p anno-rag 2>&1 | tee bench.log
      - name: Check idle RSS gate (<200 MB)
        shell: bash
        run: |
          rss=$(grep -o 'IDLE_RSS_BYTES=[0-9]*' bench.log | tail -1 | cut -d= -f2)
          mb=$((rss / 1024 / 1024))
          echo "idle RSS: ${mb} MB"
          if [ "$mb" -gt 200 ]; then
            echo "::error::idle RSS ${mb} MB exceeds 200 MB gate"
            exit 1
          fi
      - name: Check recall gate (>=95%)
        shell: bash
        run: |
          recall=$(grep -o 'RECALL_AT_10=[0-9.]*' bench.log | tail -1 | cut -d= -f2)
          echo "recall@10: $recall"
          if awk "BEGIN {exit !($recall < 0.95)}"; then
            echo "::error::recall@10 ${recall} below 0.95 gate"
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: criterion-${{ matrix.os }}
          path: target/criterion/
