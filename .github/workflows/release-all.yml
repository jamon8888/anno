name: Release — All Targets

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.14.1)'
        required: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows — DirectML (any DX12 GPU: NVIDIA/AMD/Intel) + CPU fallback
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            features: gpu-directml
            variant: directml
            bundle_dir: msi
            artifact_ext: msi

          # macOS arm64 — CoreML (Apple ANE/GPU) + CPU fallback
          - os: macos-14
            target: aarch64-apple-darwin
            features: gpu-coreml
            variant: coreml
            bundle_dir: dmg
            artifact_ext: dmg

          # NOTE: x86_64-apple-darwin (Intel Mac) not supported — ort 2.x dropped
          # prebuilt binaries for this target. Intel Mac users can run the
          # aarch64-apple-darwin binary via Rosetta 2 (transparent, no user action needed).

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.target }}-${{ matrix.variant }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        run: choco install protoc --no-progress -y

      - name: Setup Node.js (Tauri CLI)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@^2

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build anno-rag-bin
        run: >
          cargo build --release
          -p anno-rag-bin
          --target ${{ matrix.target }}
          ${{ matrix.features != '' && format('--features {0}', matrix.features) || '' }}

      - name: Smoke test binary
        run: |
          ./target/${{ matrix.target }}/release/anno-rag${{ runner.os == 'Windows' && '.exe' || '' }} --help

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          RAW=${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          echo "tag=${RAW}" >> $GITHUB_OUTPUT
          echo "semver=${RAW#v}" >> $GITHUB_OUTPUT

      - name: Set version in tauri.conf.json
        working-directory: crates/anno-rag-setup
        shell: bash
        env:
          SEMVER: ${{ steps.ver.outputs.semver }}
        run: |
          node -e "
            const c = JSON.parse(require('fs').readFileSync('tauri.conf.json','utf-8'));
            c.version = process.env.SEMVER;
            require('fs').writeFileSync('tauri.conf.json', JSON.stringify(c, null, 2) + '\n');
          "

      - name: Build Tauri installer
        working-directory: crates/anno-rag-setup
        shell: bash
        run: >
          tauri build
          --target ${{ matrix.target }}
          ${{ matrix.features != '' && format('--features {0}', matrix.features) || '' }}

      - name: Rename artifact
        shell: bash
        run: |
          VERSION=${{ steps.ver.outputs.tag }}
          SRC_DIR=crates/anno-rag-setup/target/${{ matrix.target }}/release/bundle/${{ matrix.bundle_dir }}
          DEST=anno-rag-${VERSION}-${{ matrix.target }}-${{ matrix.variant }}.${{ matrix.artifact_ext }}
          mv "${SRC_DIR}"/*."${{ matrix.artifact_ext }}" "${DEST}"
          echo "ARTIFACT=${DEST}" >> $GITHUB_ENV

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: anno-rag-${{ matrix.target }}-${{ matrix.variant }}
          path: ${{ env.ARTIFACT }}
          retention-days: 30

      - name: Upload binary (zip/tar.gz)
        shell: bash
        run: |
          VERSION=${{ steps.ver.outputs.tag }}
          BIN=./target/${{ matrix.target }}/release/anno-rag${{ runner.os == 'Windows' && '.exe' || '' }}
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            zip anno-rag-${VERSION}-${{ matrix.target }}-${{ matrix.variant }}.zip "${BIN}"
            echo "BIN_ARTIFACT=anno-rag-${VERSION}-${{ matrix.target }}-${{ matrix.variant }}.zip" >> $GITHUB_ENV
          else
            tar -czf anno-rag-${VERSION}-${{ matrix.target }}-${{ matrix.variant }}.tar.gz "${BIN}"
            echo "BIN_ARTIFACT=anno-rag-${VERSION}-${{ matrix.target }}-${{ matrix.variant }}.tar.gz" >> $GITHUB_ENV
          fi

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: anno-rag-bin-${{ matrix.target }}-${{ matrix.variant }}
          path: ${{ env.BIN_ARTIFACT }}
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.tag != '')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: |
            anno-rag-*.msi
            anno-rag-*.dmg
            anno-rag-*.zip
            anno-rag-*.tar.gz
          generate_release_notes: true
