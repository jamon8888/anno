name: Convert gliner2-PII -> ONNX FP16 (one-shot)

on:
  workflow_dispatch:
    inputs:
      push_to:
        description: 'HF repo to push converted model (e.g. anno-rag/gliner2-privacy-filter-PII-multi-onnx-fp16)'
        required: true
        default: 'anno-rag/gliner2-privacy-filter-PII-multi-onnx-fp16'

permissions:
  contents: read

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26ac26fa3b2e409a4571df0f95e5e0f46c9e30e # v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/convert-pii-onnx/requirements.txt

      - name: Convert to ONNX FP16
        env:
          PUSH_TO: ${{ github.event.inputs.push_to }}
          HF_TOKEN: ${{ secrets.HF_WRITE_TOKEN }}
        run: |
          python scripts/convert-pii-onnx/convert.py \
            --model fastino/gliner2-privacy-filter-PII-multi \
            --out /tmp/pii-onnx \
            --push-to "$PUSH_TO"

      - name: Verify output
        run: |
          python - <<'EOF'
          import onnxruntime as ort
          # Runtime expects fp16_v2/{base}_fp16.onnx layout — validate encoder graph.
          sess = ort.InferenceSession("/tmp/pii-onnx/fp16_v2/encoder_fp16.onnx")
          inputs = [i.name for i in sess.get_inputs()]
          print("ONNX inputs:", inputs)
          assert "input_ids" in inputs
          print("ONNX validation OK")
          EOF

      - name: Upload ONNX artifact (CI cache)
        uses: actions/upload-artifact@ea165f8d65b6e75b540f5f35ff5bfaef6c07c1a6 # v4.6.2
        with:
          name: gliner2-pii-onnx-fp16
          path: /tmp/pii-onnx/
          retention-days: 14
