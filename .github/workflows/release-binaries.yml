name: Release Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing v* tag to release"
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
          - os: macos-13
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz

    steps:
      - name: Guard release tag
        shell: bash
        run: |
          if [[ "$RELEASE_TAG" != v* ]]; then
            echo "RELEASE_TAG must start with v: $RELEASE_TAG" >&2
            exit 1
          fi
          git ls-remote --exit-code --tags https://github.com/${{ github.repository }} "refs/tags/${RELEASE_TAG}"

      - uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: arduino/setup-protoc@v3

      - uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true
          key: release-binaries-${{ matrix.os }}-${{ matrix.target }}

      # MSVC CRT alignment: anno-rag pulls anno/gliner2-fastino -> onnx -> ort,
      # which links ort_sys (built /MD, dynamic CRT). esaxx-rs (via tokenizers)
      # builds its C++ with cc-rs defaulting to /MT (static CRT) -> LNK2038
      # RuntimeLibrary mismatch. Force the whole Windows build onto the dynamic
      # CRT: -crt-static off for rustc, -MD for cc-rs C/C++ compilation.
      # See docs/superpowers/plans/2026-05-04-gliner2-fastino-finalization.md F1.2.
      - name: Align MSVC CRT (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          echo "RUSTFLAGS=-C target-feature=-crt-static" >> "$GITHUB_ENV"
          echo "CFLAGS_x86_64-pc-windows-msvc=-MD" >> "$GITHUB_ENV"
          echo "CXXFLAGS_x86_64-pc-windows-msvc=-MD" >> "$GITHUB_ENV"

      - name: Build release binaries
        run: cargo build --release -p anno-rag -p anno-privacy-gateway --target ${{ matrix.target }}

      - name: Smoke test anno-rag (Windows)
        if: runner.os == 'Windows'
        run: .\target\${{ matrix.target }}\release\anno-rag.exe --help

      - name: Smoke test anno-privacy-gateway (Windows)
        if: runner.os == 'Windows'
        run: .\target\${{ matrix.target }}\release\anno-privacy-gateway.exe --help

      - name: Smoke test anno-rag (macOS)
        if: runner.os == 'macOS'
        run: ./target/${{ matrix.target }}/release/anno-rag --help

      - name: Smoke test anno-privacy-gateway (macOS)
        if: runner.os == 'macOS'
        run: ./target/${{ matrix.target }}/release/anno-privacy-gateway --help

      - name: Package Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\scripts\release\package-windows.ps1 -Tag "$env:RELEASE_TAG" -Target "${{ matrix.target }}"

      - name: Inspect Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ArchivePath = Join-Path -Path "dist" -ChildPath ("hacienda-{0}-${{ matrix.target }}.zip" -f $env:RELEASE_TAG)
          if (-not (Test-Path -LiteralPath $ArchivePath -PathType Leaf)) {
            throw "Archive not found: $ArchivePath"
          }

          $ExtractDir = Join-Path -Path ([System.IO.Path]::GetTempPath()) -ChildPath ([System.Guid]::NewGuid().ToString())
          New-Item -ItemType Directory -Path $ExtractDir -Force | Out-Null

          try {
            Expand-Archive -LiteralPath $ArchivePath -DestinationPath $ExtractDir -Force

            $RequiredFiles = @(
              "anno-rag.exe",
              "anno-privacy-gateway.exe",
              "README.md",
              "LICENSE-MIT",
              "LICENSE-APACHE",
              "env.example",
              "examples/claude_desktop_config.windows.json",
              "examples/claude_desktop_config.macos.json"
            )

            $MissingFiles = @(
              foreach ($RelativePath in $RequiredFiles) {
                $FullPath = Join-Path -Path $ExtractDir -ChildPath $RelativePath
                if (-not (Test-Path -LiteralPath $FullPath -PathType Leaf)) {
                  $RelativePath
                }
              }
            )

            if ($MissingFiles.Count -gt 0) {
              Get-ChildItem -Path $ExtractDir -Recurse | Select-Object -ExpandProperty FullName
              throw "Windows archive is missing required file(s): $($MissingFiles -join ', ')"
            }
          } finally {
            Remove-Item -LiteralPath $ExtractDir -Recurse -Force -ErrorAction SilentlyContinue
          }

      - name: Package macOS archive
        if: runner.os == 'macOS'
        run: ./scripts/release/package-unix.sh "$RELEASE_TAG" "${{ matrix.target }}"

      - name: Inspect Unix archive
        if: runner.os == 'macOS'
        shell: bash
        run: |
          archive_path="dist/hacienda-${RELEASE_TAG}-${{ matrix.target }}.tar.gz"
          if [[ ! -f "${archive_path}" ]]; then
            echo "Archive not found: ${archive_path}" >&2
            exit 1
          fi

          extract_dir="$(mktemp -d)"
          trap 'rm -rf -- "${extract_dir}"' EXIT

          tar -xzf "${archive_path}" -C "${extract_dir}"
          package_dir="${extract_dir}/hacienda-${RELEASE_TAG}-${{ matrix.target }}"

          required_files=(
            "anno-rag"
            "anno-privacy-gateway"
            "README.md"
            "LICENSE-MIT"
            "LICENSE-APACHE"
            "env.example"
            "examples/claude_desktop_config.windows.json"
            "examples/claude_desktop_config.macos.json"
          )

          missing=()
          for relative_path in "${required_files[@]}"; do
            if [[ ! -f "${package_dir}/${relative_path}" ]]; then
              missing+=("${relative_path}")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            find "${extract_dir}" -type f -print
            {
              echo "Unix archive is missing required file(s):"
              printf '  %s\n' "${missing[@]}"
            } >&2
            exit 1
          fi

      - name: Upload packaged archive
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/*.${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Guard release tag
        shell: bash
        run: |
          if [[ "$RELEASE_TAG" != v* ]]; then
            echo "RELEASE_TAG must start with v: $RELEASE_TAG" >&2
            exit 1
          fi
          git ls-remote --exit-code --tags https://github.com/${{ github.repository }} "refs/tags/${RELEASE_TAG}"

      - uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}

      - name: Download packaged archives
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: ./scripts/release/checksums.sh

      - name: List distribution assets
        run: ls -la dist

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            dist/*.zip
            dist/*.tar.gz
            dist/SHA256SUMS.txt
