#
# CI that:
#
# * checks for a Git Tag that looks like a release
# * builds artifacts with dist (archives, installers, hashes)
# * uploads those artifacts to temporary workflow zip
# * on success, uploads the artifacts to a GitHub Release
#
# Note that the GitHub Release will be created with a generated
# title/body based on your changelogs.

name: Release
permissions:
  "contents": "write"

# This task will run whenever you push a git tag that looks like a version
# like "1.0.0", "v0.1.0-prerelease.1", "my-app/0.1.0", "releases/v1.0.0", etc.
# Various formats will be parsed into a VERSION and an optional PACKAGE_NAME, where
# PACKAGE_NAME must be the name of a Cargo package in your workspace, and VERSION
# must be a Cargo-style SemVer Version (must have at least major.minor.patch).
#
# If PACKAGE_NAME is specified, then the announcement will be for that
# package (erroring out if it doesn't have the given version or isn't dist-able).
#
# If PACKAGE_NAME isn't specified, then the announcement will be for all
# (dist-able) packages in the workspace with that version (this mode is
# intended for workspaces with only one dist-able package, or with all dist-able
# packages versioned/released in lockstep).
#
# If you push multiple tags at once, separate instances of this workflow will
# spin up, creating an independent announcement for each one. However, GitHub
# will hard limit this to 3 tags per commit, as it will assume more tags is a
# mistake.
#
# If there's a prerelease-style suffix to the version, then the release(s)
# will be marked as a prerelease.
on:
  push:
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.12.0)'
        required: true
        type: string

jobs:
  # Run 'dist plan' (or host) to determine what tasks we need to do
  plan:
    if: github.event_name != 'pull_request'
    runs-on: "ubuntu-22.04"
    outputs:
      val: ${{ steps.plan.outputs.manifest }}
      tag: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || (!github.event.pull_request && github.ref_name || '') }}
      tag-flag: ${{ github.event_name == 'workflow_dispatch' && format('--tag={0}', inputs.tag) || (!github.event.pull_request && format('--tag={0}', github.ref_name) || '') }}
      publishing: ${{ github.event_name == 'workflow_dispatch' || !github.event.pull_request }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || '' }}
      - name: Install dist
        # we specify bash to get pipefail; it guards against the `curl` command
        # failing. otherwise `sh` won't catch that `curl` returned non-0
        shell: bash
        run: "curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.32.0/cargo-dist-installer.sh | sh"
      - name: Cache dist
        uses: actions/upload-artifact@v7
        with:
          name: cargo-dist-cache
          path: ~/.cargo/bin/dist
      # sure would be cool if github gave us proper conditionals...
      # so here's a doubly-nested ternary-via-truthiness to try to provide the best possible
      # functionality based on whether this is a pull_request, and whether it's from a fork.
      # (PRs run on the *source* but secrets are usually on the *target* -- that's *good*
      # but also really annoying to build CI around when it needs secrets to work right.)
      - id: plan
        run: |
          dist ${{ (!github.event.pull_request && format('host --steps=create --tag={0}', github.ref_name)) || 'plan' }} --output-format=json > plan-dist-manifest.json
          echo "dist ran successfully"
          cat plan-dist-manifest.json
          echo "manifest=$(jq -c "." plan-dist-manifest.json)" >> "$GITHUB_OUTPUT"
      - name: "Upload dist-manifest.json"
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-plan-dist-manifest
          path: plan-dist-manifest.json

  # Build and packages all the platform-specific things
  build-local-artifacts:
    name: build-local-artifacts (${{ join(matrix.targets, ', ') }})
    # Let the initial task tell us to not run (currently very blunt)
    needs:
      - plan
    if: ${{ fromJson(needs.plan.outputs.val).ci.github.artifacts_matrix.include != null && (needs.plan.outputs.publishing == 'true' || fromJson(needs.plan.outputs.val).ci.github.pr_run_mode == 'upload') }}
    strategy:
      fail-fast: false
      # Target platforms/runners are computed by dist in create-release.
      # Each member of the matrix has the following arguments:
      #
      # - runner: the github runner
      # - dist-args: cli flags to pass to dist
      # - install-dist: expression to run to install dist on the runner
      #
      # Typically there will be:
      # - 1 "global" task that builds universal installers
      # - N "local" tasks that build each platform's binaries and platform-specific installers
      matrix: ${{ fromJson(needs.plan.outputs.val).ci.github.artifacts_matrix }}
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container && matrix.container.image || null }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BUILD_MANIFEST_NAME: target/distrib/${{ join(matrix.targets, '-') }}-dist-manifest.json
      # sccache and incremental compilation are mutually exclusive.
      CARGO_INCREMENTAL: "0"
    steps:
      # -- ANNO-PATCH checklist (re-apply after every `dist generate`) --------
      # 1. CARGO_INCREMENTAL=0 in job env
      # 2. Install protoc (Linux/macOS/Windows) after "Install dependencies"
      # 3. Build caching (sccache-action + rust-cache) after protoc, before CRT
      # 4. Align MSVC CRT (Windows) before dist build
      # 5. Validate release binary (Windows) after dist build
      # 6. Gateway boot smoke (Windows + Unix) after binary validation
      # 7. Package .mcpb extension after smoke
      # 8. Validate + upload .mcpb after packaging
      # ----------------------------------------------------------------------
      - name: enable windows longpaths
        run: |
          git config --global core.longpaths true
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install Rust non-interactively if not already installed
        if: ${{ matrix.container }}
        run: |
          if ! command -v cargo > /dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          fi
      - name: Install dist
        run: ${{ matrix.install_dist.run }}
      # Get the dist-manifest
      - name: Fetch local artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true
      - name: Install dependencies
        run: |
          ${{ matrix.packages_install }}
      # ANNO-PATCH: protoc is required by lance-encoding/prost during anno-rag builds.
      # Use OS package managers instead of arduino/setup-protoc to avoid GitHub
      # API rate limits in tag release jobs.
      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: |
          curl -fsSL "https://github.com/protocolbuffers/protobuf/releases/download/v25.4/protoc-25.4-linux-x86_64.zip" -o /tmp/protoc.zip
          unzip -o /tmp/protoc.zip -d /tmp/protoc
          sudo cp /tmp/protoc/bin/protoc /usr/local/bin/protoc
      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew list protobuf >/dev/null 2>&1 || brew install protobuf
      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install protoc -y --no-progress
      # ANNO-PATCH: Build caching — re-apply after every `dist generate`.
      # sccache + rust-cache warm the heavy dep tree (candle, lancedb, datafusion,
      # arrow, ort, kreuzberg) so release tags do not rebuild all deps from scratch
      # every time. First 1-2 runs after a toolchain version change will be cold;
      # subsequent runs use the GHA cache.
      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10
        with:
          version: "v0.15.0"
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ join(matrix.targets, '-') }}
      # ANNO-PATCH: MSVC CRT alignment — re-apply after every `dist generate`.
      # Keep Windows release builds on the dynamic CRT. ORT and Kreuzberg/Tesseract
      # objects resolve against /MD; forcing +crt-static (/MT) causes LNK2038
      # RuntimeLibrary mismatches. Do not add /NODEFAULTLIB:libcmt here:
      # cargo-dist --print=linkage builds transient DLLs that require the
      # default CRT startup symbols.
      - name: Align MSVC CRT (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "RUSTFLAGS=--cap-lints allow -C target-feature=-crt-static" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_RUSTFLAGS=--cap-lints allow -C target-feature=-crt-static" >> "$GITHUB_ENV"
          echo "CFLAGS_x86_64-pc-windows-msvc=/MD" >> "$GITHUB_ENV"
          echo "CFLAGS_x86_64_pc_windows_msvc=/MD" >> "$GITHUB_ENV"
          echo "CXXFLAGS_x86_64-pc-windows-msvc=/MD" >> "$GITHUB_ENV"
          echo "CXXFLAGS_x86_64_pc_windows_msvc=/MD" >> "$GITHUB_ENV"
      # ANNO-PATCH: Set up ONNX Runtime dylib (macOS) — re-apply after every `dist generate`.
      # ort-sys 2.0.0-rc.12 checks ORT_LIB_LOCATION BEFORE any platform restriction.
      # Setting ORT_LIB_LOCATION + ORT_PREFER_DYNAMIC_LINK=1 bypasses the
      # "no prebuilt binaries for x86_64-apple-darwin" hard-error.
      #
      # aarch64: Microsoft ships ORT 1.24.2 arm64 — download directly.
      # x86_64:  Microsoft stopped shipping x86_64 after ORT 1.22. Use Homebrew
      #          (onnxruntime 1.26+) which covers Intel Mac. ORT C API is stable;
      #          ort-sys bindings generated for 1.24 work with 1.26 at runtime.
      - name: Set up ONNX Runtime dylib (macOS aarch64)
        if: runner.os == 'macOS' && contains(join(matrix.targets, '-'), 'aarch64')
        shell: bash
        run: |
          ORT_VERSION="1.24.4"
          mkdir -p /tmp/ort-arm
          curl -fsSL "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-osx-arm64-${ORT_VERSION}.tgz" \
            -o /tmp/ort-arm/ort.tgz
          tar -xf /tmp/ort-arm/ort.tgz -C /tmp/ort-arm
          ORT_DIR=$(find /tmp/ort-arm -maxdepth 1 -type d -name "onnxruntime-*" | head -1)
          echo "ORT_LIB_LOCATION=${ORT_DIR}/lib" >> "$GITHUB_ENV"
          echo "ORT_PREFER_DYNAMIC_LINK=1" >> "$GITHUB_ENV"
          echo "ORT arm64 lib: ${ORT_DIR}/lib" && ls "${ORT_DIR}/lib"
      - name: Set up ONNX Runtime dylib (macOS x86_64 via Homebrew)
        if: runner.os == 'macOS' && contains(join(matrix.targets, '-'), 'x86_64')
        shell: bash
        run: |
          # Microsoft dropped x86_64-apple-darwin ORT binaries after 1.22.
          # Homebrew ships onnxruntime for Intel Mac; ORT C API is stable across minor versions.
          brew list onnxruntime &>/dev/null || brew install onnxruntime
          # Use find to locate the dylib — Homebrew keg layout may vary across versions.
          ORT_CELLAR=$(brew --cellar onnxruntime)
          ORT_DYLIB=$(find "${ORT_CELLAR}" -name "libonnxruntime*.dylib" | grep -v dSYM | head -1)
          ORT_LIB_DIR=$(dirname "${ORT_DYLIB}")
          echo "ORT_LIB_LOCATION=${ORT_LIB_DIR}" >> "$GITHUB_ENV"
          echo "ORT_PREFER_DYNAMIC_LINK=1" >> "$GITHUB_ENV"
          echo "ORT x86_64 dylib: ${ORT_DYLIB}"
          ls "${ORT_LIB_DIR}/"
      - name: Build artifacts
        run: |
          # Actually do builds and make zips and whatnot
          dist build ${{ needs.plan.outputs.tag-flag }} --print=linkage --output-format=json ${{ matrix.dist_args }} > dist-manifest.json
          echo "dist ran successfully"
      # ANNO-PATCH: macOS .dmg packaging — re-apply after every `dist generate`.
      # Bundles libonnxruntime.dylib alongside the binary so users need no Homebrew.
      # Fixes the rpath so @executable_path resolves the bundled dylib at runtime.
      - name: Bundle ORT dylib + create .dmg (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          TARGET="${{ join(matrix.targets, '-') }}"
          BINARY="target/${TARGET}/dist/anno-rag"
          RELEASE_TAG="${{ needs.plan.outputs.tag }}"
          DMG_NAME="anno-rag-${RELEASE_TAG}-${TARGET}.dmg"

          # All dist binaries that link ONNX Runtime dynamically and therefore need
          # their rpath patched to find the bundled @executable_path/libonnxruntime.dylib.
          # Add new ORT-linked binaries here — single place to update.
          ORT_RPATH_BINARIES=(
            "${BINARY}"
            "target/${TARGET}/dist/anno-privacy-gateway"
          )

          # Locate the ORT dylib that was set up in ORT_LIB_LOCATION
          ORT_DYLIB="${ORT_LIB_LOCATION}/libonnxruntime.dylib"
          if [ ! -f "${ORT_DYLIB}" ]; then
            # Fallback: find any libonnxruntime*.dylib in ORT_LIB_LOCATION
            ORT_DYLIB=$(find "${ORT_LIB_LOCATION}" -name "libonnxruntime*.dylib" | grep -v dSYM | head -1)
          fi
          echo "Bundling ORT dylib: ${ORT_DYLIB}"

          # Copy dylib alongside binary in the dist folder
          cp "${ORT_DYLIB}" "target/${TARGET}/dist/libonnxruntime.dylib"

          # Patch every ORT-linked dist binary's rpath so it finds
          # @executable_path/libonnxruntime.dylib. The gateway boot smoke step below
          # runs anno-privacy-gateway directly from this dist dir (not from
          # dmg-staging), so it needs the same treatment as anno-rag or it
          # dyld-aborts at startup.
          for BIN in "${ORT_RPATH_BINARIES[@]}"; do
            if [ ! -f "${BIN}" ]; then
              echo "Skipping rpath patch, binary not found: ${BIN}"
              continue
            fi
            LINKED=$(otool -L "${BIN}" 2>/dev/null | grep -i onnxruntime | awk '{print $1}' || true)
            if [ -n "${LINKED}" ]; then
              echo "Currently linked ORT (${BIN}): ${LINKED}"
              install_name_tool -change "${LINKED}" "@executable_path/libonnxruntime.dylib" "${BIN}" || true
            else
              echo "No ORT dylib ref in ${BIN} (may be statically linked or absent)"
            fi
            # Ensure @executable_path is in rpath (non-fatal)
            install_name_tool -add_rpath "@executable_path" "${BIN}" 2>/dev/null || true
            # Diagnostics only — non-fatal
            echo "After patching (${BIN}):" && otool -L "${BIN}" | grep -i ort || echo "(no ORT ref)"
          done

          # Build .dmg staging
          DMG_STAGING="dmg-staging-${TARGET}"
          mkdir -p "${DMG_STAGING}"
          cp "${BINARY}" "${DMG_STAGING}/anno-rag"
          cp "target/${TARGET}/dist/libonnxruntime.dylib" "${DMG_STAGING}/"
          # Simple install helper script
          cat > "${DMG_STAGING}/install.sh" << 'INSTALL'
          #!/bin/sh
          set -e
          DIR="$(cd "$(dirname "$0")" && pwd)"
          sudo cp "${DIR}/anno-rag" /usr/local/bin/anno-rag
          sudo cp "${DIR}/libonnxruntime.dylib" /usr/local/lib/libonnxruntime.dylib
          echo "anno-rag installed to /usr/local/bin"
          echo "libonnxruntime.dylib installed to /usr/local/lib"
          INSTALL
          chmod +x "${DMG_STAGING}/install.sh"

          # Create .dmg into a staging output dir picked up by the host job.
          mkdir -p dmg-out
          hdiutil create \
            -volname "anno-rag ${RELEASE_TAG}" \
            -srcfolder "${DMG_STAGING}" \
            -ov -format UDZO \
            "dmg-out/${DMG_NAME}"
          echo "DMG created: dmg-out/${DMG_NAME}" && ls -lh "dmg-out/${DMG_NAME}"
      # Upload the .dmg as a workflow artifact so the `host` job includes it in
      # the GitHub Release (the release does not exist yet at build time).
      - name: Upload .dmg artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-dmg-${{ join(matrix.targets, '-') }}
          path: dmg-out/*.dmg

      # ANNO-PATCH: Release binary validation — re-apply after every `dist generate`.
      - name: Validate anno-rag release binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\scripts\release\verify-release-binary.ps1 -BinaryPath ".\target\${{ join(matrix.targets, '-') }}\dist\anno-rag.exe"
      # ANNO-PATCH: Gateway boot smoke — re-apply after every `dist generate`.
      # anno-privacy-gateway is a server binary; --help starts the server (does not print and exit).
      # These scripts start on ANNO_GATEWAY_LISTEN=127.0.0.1:0, wait 3s, verify alive, terminate.
      - name: Gateway boot smoke (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\scripts\release\smoke-gateway.ps1 -BinaryPath ".\target\${{ join(matrix.targets, '-') }}\dist\anno-privacy-gateway.exe"
      - name: Gateway boot smoke (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: ./scripts/release/smoke-gateway.sh "./target/${{ join(matrix.targets, '-') }}/dist/anno-privacy-gateway"
      # ANNO-PATCH: .mcpb extension packaging — re-apply after every `dist generate`.
      - name: Package .mcpb extension
        shell: bash
        run: |
          TARGET="${{ join(matrix.targets, '-') }}"
          RELEASE_TAG="${{ needs.plan.outputs.tag }}"
          MCPB_NAME="hacienda-${RELEASE_TAG}-${TARGET}.mcpb"
          VERSION="${RELEASE_TAG#v}"
          if [ "${{ runner.os }}" = "Windows" ]; then
            BIN="anno-rag.exe"
            PLATFORM="win32"
          elif [ "${{ runner.os }}" = "macOS" ]; then
            BIN="anno-rag"
            PLATFORM="darwin"
          else
            BIN="anno-rag"
            PLATFORM="linux"
          fi
          mkdir -p mcpb-staging/server
          cp "target/${TARGET}/dist/${BIN}" mcpb-staging/server/
          python3 -c "
          import json, sys
          m = json.load(open('scripts/release/mcpb-manifest-template.json'))
          m['version'] = sys.argv[1]
          m['compatibility']['platforms'] = [sys.argv[2]]
          m['server']['entry_point'] = 'server/' + sys.argv[3]
          m['server']['mcp_config']['command'] = '\${__dirname}/server/' + sys.argv[3]
          json.dump(m, open('mcpb-staging/manifest.json', 'w'), indent=2)
          print('manifest OK')
          " "$VERSION" "$PLATFORM" "$BIN"
          python3 - "$MCPB_NAME" <<'PY'
          import pathlib
          import sys
          import zipfile

          package = pathlib.Path(sys.argv[1])
          staging = pathlib.Path("mcpb-staging")
          if package.exists():
              package.unlink()

          with zipfile.ZipFile(package, "w", compression=zipfile.ZIP_DEFLATED) as archive:
              for path in sorted(p for p in staging.rglob("*") if p.is_file()):
                  archive.write(path, path.relative_to(staging).as_posix())

          print(f"package OK {package}")
          PY
          echo "MCPB_NAME=${MCPB_NAME}" >> "$GITHUB_ENV"

      # ANNO-PATCH: .mcpb validation and upload — re-apply after every `dist generate`.
      - name: Validate .mcpb extension
        shell: bash
        run: |
          TARGET="${{ join(matrix.targets, '-') }}"
          if [ "${{ runner.os }}" = "Windows" ]; then
            BIN="anno-rag.exe"
            PLATFORM="win32"
          elif [ "${{ runner.os }}" = "macOS" ]; then
            BIN="anno-rag"
            PLATFORM="darwin"
          else
            BIN="anno-rag"
            PLATFORM="linux"
          fi
          python3 scripts/release/verify-mcpb.py "${MCPB_NAME}" --binary "${BIN}" --platform "${PLATFORM}"

      - name: Upload .mcpb artifact
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-mcpb-${{ join(matrix.targets, '_') }}
          path: ${{ env.MCPB_NAME }}

      # ANNO-PATCH: attach config artifacts to release archive — re-apply after every `dist generate`.
      - name: Bundle config artifacts
        shell: bash
        run: |
          TARGET="${{ join(matrix.targets, '-') }}"
          cp crates/anno-rag/config-schema.json    "target/${TARGET}/dist/"
          cp crates/anno-rag/config.toml.example   "target/${TARGET}/dist/"
          cp docs/reference/configuration.md       "target/${TARGET}/dist/CONFIGURATION.md"

      - id: cargo-dist
        name: Post-build
        # We force bash here just because github makes it really hard to get values up
        # to "real" actions without writing to env-vars, and writing to env-vars has
        # inconsistent syntax between shell and powershell.
        shell: bash
        run: |
          # Parse out what we just built and upload it to scratch storage
          echo "paths<<EOF" >> "$GITHUB_OUTPUT"
          dist print-upload-files-from-manifest --manifest dist-manifest.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          cp dist-manifest.json "$BUILD_MANIFEST_NAME"
      - name: "Upload artifacts"
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-build-local-${{ join(matrix.targets, '_') }}
          path: |
            ${{ steps.cargo-dist.outputs.paths }}
            ${{ env.BUILD_MANIFEST_NAME }}

  # Build and package all the platform-agnostic(ish) things
  build-global-artifacts:
    needs:
      - plan
      - build-local-artifacts
    runs-on: "ubuntu-22.04"
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BUILD_MANIFEST_NAME: target/distrib/global-dist-manifest.json
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install cached dist
        uses: actions/download-artifact@v8
        with:
          name: cargo-dist-cache
          path: ~/.cargo/bin/
      - run: chmod +x ~/.cargo/bin/dist
      # Get all the local artifacts for the global tasks to use (for e.g. checksums)
      - name: Fetch local artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true
      - id: cargo-dist
        shell: bash
        run: |
          dist build ${{ needs.plan.outputs.tag-flag }} --output-format=json "--artifacts=global" > dist-manifest.json
          echo "dist ran successfully"

          # Parse out what we just built and upload it to scratch storage
          echo "paths<<EOF" >> "$GITHUB_OUTPUT"
          jq --raw-output ".upload_files[]" dist-manifest.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          cp dist-manifest.json "$BUILD_MANIFEST_NAME"
      - name: "Upload artifacts"
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-build-global
          path: |
            ${{ steps.cargo-dist.outputs.paths }}
            ${{ env.BUILD_MANIFEST_NAME }}
  # Determines if we should publish/announce
  host:
    needs:
      - plan
      - build-local-artifacts
      - build-global-artifacts
    # Only run if we're "publishing", and only if plan, local and global didn't fail (skipped is fine)
    if: ${{ always() && needs.plan.result == 'success' && needs.plan.outputs.publishing == 'true' && (needs.build-global-artifacts.result == 'skipped' || needs.build-global-artifacts.result == 'success') && (needs.build-local-artifacts.result == 'skipped' || needs.build-local-artifacts.result == 'success') }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    runs-on: "ubuntu-22.04"
    outputs:
      val: ${{ steps.host.outputs.manifest }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install cached dist
        uses: actions/download-artifact@v8
        with:
          name: cargo-dist-cache
          path: ~/.cargo/bin/
      - run: chmod +x ~/.cargo/bin/dist
      # Fetch artifacts from scratch-storage
      - name: Fetch artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true
      - id: host
        shell: bash
        run: |
          dist host ${{ needs.plan.outputs.tag-flag }} --steps=upload --steps=release --output-format=json > dist-manifest.json
          echo "artifacts uploaded and released successfully"
          cat dist-manifest.json
          echo "manifest=$(jq -c "." dist-manifest.json)" >> "$GITHUB_OUTPUT"
      - name: "Upload dist-manifest.json"
        uses: actions/upload-artifact@v7
        with:
          # Overwrite the previous copy
          name: artifacts-dist-manifest
          path: dist-manifest.json
      # Create a GitHub Release while uploading all files to it
      - name: "Download GitHub Artifacts"
        uses: actions/download-artifact@v8
        with:
          pattern: artifacts-*
          path: artifacts
          merge-multiple: true
      - name: Cleanup
        run: |
          # Remove the granular manifests
          rm -f artifacts/*-dist-manifest.json
      - name: Create GitHub Release
        env:
          PRERELEASE_FLAG: "${{ fromJson(steps.host.outputs.manifest).announcement_is_prerelease && '--prerelease' || '' }}"
          ANNOUNCEMENT_TITLE: "${{ fromJson(steps.host.outputs.manifest).announcement_title }}"
          ANNOUNCEMENT_BODY: "${{ fromJson(steps.host.outputs.manifest).announcement_github_body }}"
          RELEASE_COMMIT: "${{ github.sha }}"
        run: |
          # Write and read notes from a file to avoid quoting breaking things
          echo "$ANNOUNCEMENT_BODY" > $RUNNER_TEMP/notes.txt

          gh release create "${{ needs.plan.outputs.tag }}" --target "$RELEASE_COMMIT" $PRERELEASE_FLAG --title "$ANNOUNCEMENT_TITLE" --notes-file "$RUNNER_TEMP/notes.txt" artifacts/*

  publish-homebrew-formula:
    needs:
      - plan
      - host
    runs-on: "ubuntu-22.04"
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PLAN: ${{ needs.plan.outputs.val }}
      GITHUB_USER: "axo bot"
      GITHUB_EMAIL: "admin+bot@axo.dev"
    if: ${{ !fromJson(needs.plan.outputs.val).announcement_is_prerelease || fromJson(needs.plan.outputs.val).publish_prereleases }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: true
          repository: "jamon8888/homebrew-hacienda"
          token: ${{ secrets.HOMEBREW_TAP_TOKEN || github.token }}
      # So we have access to the formula
      - name: Fetch homebrew formulae
        uses: actions/download-artifact@v8
        with:
          pattern: artifacts-*
          path: Formula/
          merge-multiple: true
      # This is extra complex because you can make your Formula name not match your app name
      # so we need to find releases with a *.rb file, and publish with that filename.
      - name: Commit formula files
        run: |
          git config --global user.name "${GITHUB_USER}"
          git config --global user.email "${GITHUB_EMAIL}"

          for release in $(echo "$PLAN" | jq --compact-output '.releases[] | select([.artifacts[] | endswith(".rb")] | any)'); do
            filename=$(echo "$release" | jq '.artifacts[] | select(endswith(".rb"))' --raw-output)
            name=$(echo "$filename" | sed "s/\.rb$//")
            version=$(echo "$release" | jq .app_version --raw-output)

            export PATH="/home/linuxbrew/.linuxbrew/bin:$PATH"
            brew update
            # We avoid reformatting user-provided data such as the app description and homepage.
            brew style --except-cops FormulaAudit/Homepage,FormulaAudit/Desc,FormulaAuditStrict --fix "Formula/${filename}" || true

            git add "Formula/${filename}"
            git commit -m "${name} ${version}"
          done
          git push

  # ANNO-PATCH: GPU-optimised build variants — re-apply after every `dist generate`.
  # Produces separate binaries/DMGs for Metal (Apple Silicon) and CUDA (NVIDIA).
  # These are uploaded to the same GitHub release as additional optional downloads.
  build-gpu-artifacts:
    needs:
      - plan
      - host
    # Run only on real releases (not PRs), after the CPU release is published.
    if: ${{ always() && needs.plan.result == 'success' && needs.host.result == 'success' }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CARGO_INCREMENTAL: "0"
      RELEASE_TAG: ${{ needs.plan.outputs.tag }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Apple Silicon — Metal GPU ──────────────────────────────────────
          - name: metal
            runner: macos-14
            target: aarch64-apple-darwin
            features: gpu-metal
            suffix: -metal
            os: macos
          # ── Intel Mac — Metal not available; CPU-only, kept for completeness
          # ── Linux x86_64 — NVIDIA CUDA ────────────────────────────────────
          - name: cuda-linux
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            features: gpu-cuda
            suffix: -cuda
            os: linux
          # ── Windows x86_64 — NVIDIA CUDA ──────────────────────────────────
          - name: cuda-windows
            runner: windows-2022
            target: x86_64-pc-windows-msvc
            features: gpu-cuda
            suffix: -cuda
            os: windows
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

      # ── Rust toolchain ───────────────────────────────────────────────────
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # ── protoc (required by lance-encoding/prost) ─────────────────────
      - name: Install protoc (Linux)
        if: matrix.os == 'linux'
        run: |
          curl -fsSL "https://github.com/protocolbuffers/protobuf/releases/download/v25.4/protoc-25.4-linux-x86_64.zip" -o /tmp/protoc.zip
          unzip -o /tmp/protoc.zip -d /tmp/protoc
          sudo cp /tmp/protoc/bin/protoc /usr/local/bin/protoc
      - name: Install protoc (macOS)
        if: matrix.os == 'macos'
        run: brew list protobuf >/dev/null 2>&1 || brew install protobuf
      - name: Install protoc (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: choco install protoc -y --no-progress

      # ── sccache ─────────────────────────────────────────────────────────
      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10
      - run: |
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
        shell: bash

      # ── CUDA toolkit (Linux + Windows only) ─────────────────────────────
      - name: Install CUDA toolkit (Linux)
        if: matrix.os == 'linux'
        uses: Jimver/cuda-toolkit@v0.2.23
        with:
          cuda: "12.4.1"
          method: network
          sub-packages: '["nvcc","cudart"]'
      # cuBLAS packages use the lib* prefix on Ubuntu — Jimver generates wrong names
      # (cuda-cublas-12-4) for these; install them directly.
      - name: Install cuBLAS (Linux)
        if: matrix.os == 'linux'
        run: sudo apt-get install -y libcublas-12-4 libcublas-dev-12-4

      - name: Install CUDA toolkit (Windows)
        if: matrix.os == 'windows'
        uses: Jimver/cuda-toolkit@v0.2.23
        with:
          cuda: "12.4.1"
          method: network
          sub-packages: '["nvcc","cudart","cublas","cublas_dev"]'

      # ── ORT dylib for macOS Metal build (same as CPU build) ─────────────
      - name: Set up ORT dylib (macOS Metal)
        if: matrix.os == 'macos'
        shell: bash
        run: |
          ORT_VERSION="1.24.4"
          mkdir -p /tmp/ort-arm
          curl -fsSL "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-osx-arm64-${ORT_VERSION}.tgz" \
            -o /tmp/ort-arm/ort.tgz
          tar -xf /tmp/ort-arm/ort.tgz -C /tmp/ort-arm
          ORT_DIR=$(find /tmp/ort-arm -maxdepth 1 -type d -name "onnxruntime-*" | head -1)
          echo "ORT_LIB_LOCATION=${ORT_DIR}/lib" >> "$GITHUB_ENV"
          echo "ORT_PREFER_DYNAMIC_LINK=1" >> "$GITHUB_ENV"

      # ── Build GPU binary ─────────────────────────────────────────────────
      - name: Build GPU binary
        shell: bash
        run: |
          cargo build --release -p anno-rag-bin \
            --target ${{ matrix.target }} \
            --features ${{ matrix.features }}

      # ── Package macOS .dmg (Metal) ───────────────────────────────────────
      - name: Package macOS .dmg (Metal)
        if: matrix.os == 'macos'
        shell: bash
        run: |
          BINARY="target/${{ matrix.target }}/release/anno-rag"
          ORT_DYLIB="${ORT_LIB_LOCATION}/libonnxruntime.dylib"
          DMG_NAME="anno-rag${SUFFIX}-${RELEASE_TAG}-${{ matrix.target }}.dmg"

          # Bundle ORT dylib + fix rpath
          cp "${ORT_DYLIB}" "$(dirname ${BINARY})/libonnxruntime.dylib"
          LINKED=$(otool -L "${BINARY}" | grep onnxruntime | awk '{print $1}')
          install_name_tool -change "${LINKED}" "@executable_path/libonnxruntime.dylib" "${BINARY}"
          install_name_tool -add_rpath "@executable_path" "${BINARY}" 2>/dev/null || true

          # Stage & create DMG
          mkdir -p dmg-staging
          cp "${BINARY}" dmg-staging/anno-rag
          cp "$(dirname ${BINARY})/libonnxruntime.dylib" dmg-staging/
          cat > dmg-staging/install.sh << 'INSTALL'
          #!/bin/sh
          set -e
          DIR="$(cd "$(dirname "$0")" && pwd)"
          sudo cp "${DIR}/anno-rag" /usr/local/bin/anno-rag
          sudo cp "${DIR}/libonnxruntime.dylib" /usr/local/lib/libonnxruntime.dylib
          echo "anno-rag (Metal GPU) installed"
          INSTALL
          chmod +x dmg-staging/install.sh

          hdiutil create -volname "anno-rag Metal ${RELEASE_TAG}" \
            -srcfolder dmg-staging -ov -format UDZO "${DMG_NAME}"
          echo "DMG_ASSET=${DMG_NAME}" >> "$GITHUB_ENV"
        env:
          SUFFIX: ${{ matrix.suffix }}

      # ── Package Linux CUDA tarball ────────────────────────────────────────
      - name: Package Linux CUDA tarball
        if: matrix.os == 'linux'
        shell: bash
        run: |
          BINARY="target/${{ matrix.target }}/release/anno-rag"
          TAR_NAME="anno-rag${SUFFIX}-${RELEASE_TAG}-${{ matrix.target }}.tar.gz"
          mkdir -p pkg-staging
          cp "${BINARY}" pkg-staging/anno-rag
          tar czf "${TAR_NAME}" -C pkg-staging anno-rag
          echo "TAR_ASSET=${TAR_NAME}" >> "$GITHUB_ENV"
        env:
          SUFFIX: ${{ matrix.suffix }}

      # ── Package Windows CUDA zip ──────────────────────────────────────────
      - name: Package Windows CUDA zip
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $binary = "target\${{ matrix.target }}\release\anno-rag.exe"
          $zipName = "anno-rag${{ matrix.suffix }}-${env:RELEASE_TAG}-${{ matrix.target }}.zip"
          Compress-Archive -Path $binary -DestinationPath $zipName
          "ZIP_ASSET=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Append

      # ── Upload GPU artifact to the GitHub Release ─────────────────────────
      - name: Upload GPU artifact to release (macOS)
        if: matrix.os == 'macos'
        shell: bash
        run: gh release upload "${RELEASE_TAG}" "${DMG_ASSET}" --clobber

      - name: Upload GPU artifact to release (Linux)
        if: matrix.os == 'linux'
        shell: bash
        run: gh release upload "${RELEASE_TAG}" "${TAR_ASSET}" --clobber

      - name: Upload GPU artifact to release (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: gh release upload "${env:RELEASE_TAG}" "${env:ZIP_ASSET}" --clobber

  announce:
    needs:
      - plan
      - host
      - publish-homebrew-formula
    # use "always() && ..." to allow us to wait for all publish jobs while
    # still allowing individual publish jobs to skip themselves (for prereleases).
    # "host" however must run to completion, no skipping allowed!
    if: ${{ always() && needs.host.result == 'success' && (needs.publish-homebrew-formula.result == 'skipped' || needs.publish-homebrew-formula.result == 'success' || needs.publish-homebrew-formula.result == 'failure') }}
    runs-on: "ubuntu-22.04"
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
