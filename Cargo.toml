[workspace]
# Workspace Architecture
# ======================
#
# Pipeline:
#   Text → Extract → Coalesce → Knowledge Graph
#          (anno)   (coalesce)
#
members = [
    "crates/anno",
    "crates/anno-core",
    "crates/anno-eval",
    "crates/anno-cli",
    "crates/anno-lattix",
    "crates/anno-metrics",
]
resolver = "2"

[workspace.package]
version = "0.2.0"
edition = "2021"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
authors = ["Arc <attobop@gmail.com>"]
repository = "https://github.com/arclabs561/anno"
homepage = "https://docs.rs/anno"
documentation = "https://docs.rs/anno"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
regex = "1"
chrono = { version = "0.4", features = ["serde"] }
log = "0.4"
once_cell = "1"
bitflags = "2"

# `textprep` is published on crates.io. For local development with sibling checkouts,
# merge `.cargo/config.toml.example` into your `.cargo/config.toml` to patch it to a path dependency.
textprep = "0.1"
sketchir = "0.1.2"
clump = "0.1.0"

## Clustering / stratification
#
# Hierarchical clustering has been archived out of this workspace (see `archive/anno-tier/`).

# CLI dependencies
clap = { version = "4", features = ["derive", "env", "wrap_help"] }
clap_complete = "4"
is-terminal = "0.4"
glob = "0.3"
indicatif = "0.17"
toml = "0.8"

# Evaluation
rand = "0.9"
ureq = { version = "2", features = ["json"] }
sha2 = "0.10"
dirs = "5"

# ML backends (not optional in workspace - individual crates can make them optional)
ort = "2.0.0-rc.10"
tokenizers = "0.22"
hf-hub = "0.4"
ndarray = "0.16"
lru = "0.12"
candle-core = "0.9"
candle-nn = "0.9"
candle-transformers = "0.9"
safetensors = "0.4"

# Burn ML framework (training + inference, WebGPU support)
burn = "0.20.0"
burn-ndarray = "0.20.0"
burn-tch = "0.20.0"
burn-wgpu = "0.20.0"
burn-autodiff = "0.20.0"

# Async
tokio = { version = "1", features = ["rt", "sync"] }
futures = "0.3"

# Performance
crossbeam-channel = "0.5"
parking_lot = "0.12"
rayon = "1"

# Utilities
itertools = "0.14"
smallvec = { version = "1.13", features = ["serde"] }
dashmap = "6"
unicode-normalization = "0.1.25"
rusqlite = { version = "0.37", features = ["bundled"] }

# Observability
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Testing
proptest = "1"
criterion = { version = "0.5", features = ["html_reports"] }

# Local development: see .cargo/config.toml.example for path overrides

[workspace.lints.rust]
missing_docs = "warn"

[workspace.lints.clippy]
unwrap_used = "warn"

[package]
name = "anno"
version = { workspace = true }
edition = { workspace = true }
rust-version = { workspace = true }
license = { workspace = true }
authors = { workspace = true }
repository = { workspace = true }
homepage = { workspace = true }
documentation = { workspace = true }
description = "Information extraction for Rust: Named Entity Recognition (NER), coreference resolution, and structured extraction"
readme = "README.md"
keywords = ["ner", "nlp", "information-extraction", "coreference", "rust"]
categories = ["text-processing"]
publish = true

[dependencies]
anno-lib = { path = "crates/anno", package = "anno-lib", version = "0.2.0", default-features = false }
serde_json = { workspace = true }

[features]
default = ["onnx"]

# Forward library feature flags to `anno-lib`.
discourse = ["anno-lib/discourse"]
eval = ["anno-lib/eval"]
analysis = ["anno-lib/analysis"]
graph = ["anno-lib/graph"]
gramdex = ["anno-lib/gramdex"]
schema = ["anno-lib/schema"]
onnx = ["anno-lib/onnx"]
candle = ["anno-lib/candle"]
metal = ["anno-lib/metal"]
cuda = ["anno-lib/cuda"]
burn = ["anno-lib/burn"]
semantic-chunking = ["anno-lib/semantic-chunking"]
async-inference = ["anno-lib/async-inference"]
session-pool = ["anno-lib/session-pool"]
subsume = ["anno-lib/subsume"]
instrument = ["anno-lib/instrument"]
llm = ["anno-lib/llm"]
fast-lock = ["anno-lib/fast-lock"]
jiff-time = ["anno-lib/jiff-time"]
production = ["anno-lib/production"]
full = ["anno-lib/full"]
full-workspace = ["anno-lib/full-workspace"]
bundled-crf-weights = ["anno-lib/bundled-crf-weights"]
bundled-hmm-params = ["anno-lib/bundled-hmm-params"]

# Local development override: use sibling checkout of `muxer`.
#
# This repo depends on `muxer` via a git dependency in `anno-eval`/`anno-cli` so that releases are
# pinned and reproducible. In the super-workspace, we want local changes to `dev/muxer/` to take
# effect without updating a git rev.
[patch."https://github.com/arclabs561/muxer.git"]
muxer = { path = "../muxer" }

[patch.crates-io]
logp = { path = "../logp" }
pare = { path = "../pare" }
