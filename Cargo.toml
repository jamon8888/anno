[workspace]
# Workspace Architecture
# ======================
#
# Pipeline:
#   Text → Extract → Coalesce → Export
#          (anno)   (anno-core)
#
members = [
    "crates/anno",
    "crates/anno-core",
    "crates/anno-eval",
    "crates/anno-cli",
    "crates/anno-graph",
    "crates/anno-metrics",
]
resolver = "2"

[workspace.package]
version = "0.3.7"
edition = "2024"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
authors = ["Arc <attobop@gmail.com>"]
repository = "https://github.com/arclabs561/anno"
homepage = "https://docs.rs/anno"
documentation = "https://docs.rs/anno"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
regex = "1"
chrono = { version = "0.4", features = ["serde"] }
log = "0.4"
bitflags = "2"

# `textprep` is published on crates.io. For local development with sibling checkouts,
# merge `.cargo/config.toml.example` into your `.cargo/config.toml` to patch it to a path dependency.
textprep = "0.1"
sketchir = "0.2.0"
clump = "0.1.0"
graphops = "0.1.0"
innr = "0.1"

## Clustering / stratification
#
# Hierarchical clustering has been archived out of this workspace (see `archive/anno-tier/`).

# CLI dependencies
clap = { version = "4", features = ["derive", "env", "wrap_help"] }
clap_complete = "4"
is-terminal = "0.4"
glob = "0.3"
indicatif = "0.17"
toml = "0.8"

# Evaluation
rand = "0.9"
ureq = { version = "2", features = ["json"] }
sha2 = "0.10"
dirs = "5"

# ML backends (not optional in workspace - individual crates can make them optional)
ort = "=2.0.0-rc.10"
tokenizers = "0.22"
hf-hub = "0.4"
ndarray = "0.16"
lru = "0.12"
candle-core = "0.9"
candle-nn = "0.9"
candle-transformers = "0.9"
safetensors = "0.4"

# Document-to-text extraction
deformat = "0.4"

# Async
tokio = { version = "1", features = ["rt", "sync", "macros", "rt-multi-thread"] }
futures = "0.3"

# Performance
crossbeam-channel = "0.5"
parking_lot = "0.12"
rayon = "1"

# Utilities
itertools = "0.14"
smallvec = { version = "1.13", features = ["serde"] }
dashmap = "6"
unicode-normalization = "0.1.25"
rusqlite = { version = "0.37", features = ["bundled"] }

# Observability
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Testing
proptest = "1"
criterion = { version = "0.5", features = ["html_reports"] }

# Local development: see .cargo/config.toml.example for path overrides

[workspace.lints.rust]
missing_docs = "warn"

[workspace.lints.clippy]
unwrap_used = "warn"

[package]
name = "anno"
version = { workspace = true }
edition = { workspace = true }
rust-version = { workspace = true }
license = { workspace = true }
authors = { workspace = true }
repository = { workspace = true }
homepage = { workspace = true }
documentation = { workspace = true }
description = "Information extraction in Rust: NER, coreference resolution, entity linking, event extraction, and zero-shot entity types"
readme = "README.md"
keywords = ["ner", "nlp", "extraction", "coreference", "rust"]
categories = ["text-processing"]
publish = true
include = [
    "/src/**/*.rs",
    "/Cargo.toml",
    "/Cargo.lock",
    "/LICENSE",
    "/LICENSE-*",
    "/README.md",
]

[lib]
doc = false

[dependencies]
anno-lib = { path = "crates/anno", package = "anno-lib", version = "0.3.7", default-features = false }
serde_json = { workspace = true }

[features]
default = ["onnx"]

# Keep the facade surface intentionally small: expose stable capability toggles,
# not every internal wiring switch from `anno-lib`.
discourse = ["anno-lib/discourse"]
eval = ["anno-lib/eval"]
analysis = ["anno-lib/analysis"]
graph = ["anno-lib/graph"]
schema = ["anno-lib/schema"]
onnx = ["anno-lib/onnx"]
candle = ["anno-lib/candle"]
metal = ["anno-lib/metal"]
cuda = ["anno-lib/cuda"]
llm = ["anno-lib/llm"]
semantic-chunking = ["anno-lib/semantic-chunking"]
production = ["anno-lib/production"]
bundled-crf-weights = ["anno-lib/bundled-crf-weights"]
bundled-hmm-params = ["anno-lib/bundled-hmm-params"]

# Local development overrides (path patches) live in `.cargo/config.toml`.
# See `.cargo/config.toml.example` for the super-workspace setup.
