[workspace]
# Workspace Architecture
# ======================
#
# Pipeline:
#   Text → Extract → Coalesce → Stratify → Knowledge Graph
#          (anno)   (coalesce)  (strata)
#
# Dependency graph:
#
#   anno-core (18k - Entity, Track, Identity, Signal)
#       ↑
#       ├── anno-coalesce (9k - cross-doc entity resolution)
#       ├── anno-strata (3k - graph algorithms: PageRank, Leiden)
#       │
#       └── anno (120k - NER backends, coref, eval, CLI)
#               ↑
#               └── anno binary (via [[bin]] in anno/Cargo.toml)
#
# Archived (see archive/skeleton-crates-2024-12/):
#   - anno-eval: thin re-export of anno with eval feature (unnecessary)
#   - anno-derive: Dataset derive macro (never used by any crate)
#   - anno-models: Runtime trait idea, not integrated
#   - anno-rel: Relation types, duplicated in anno::backends::inference
#
members = [
    "anno-core",
    # "anno-models",  # Removed: skeleton crate, Runtime trait not integrated
    # "anno-rel",     # Removed: skeleton crate, types exist in anno::backends::inference
    "anno",
    "anno-coalesce",
    "anno-strata",
    # "anno-eval",  # Archived: thin re-export of anno with eval feature
    # (no separate CLI crate; binary now in anno/src/bin/anno.rs)
    # "anno-derive",  # Archived: Dataset derive macro not used by any crate
]
resolver = "2"

[workspace.package]
version = "0.2.0"
edition = "2021"
rust-version = "1.75"
license = "MIT OR Apache-2.0"
authors = ["Arc <attobop@gmail.com>"]
repository = "https://github.com/arclabs561/anno"
homepage = "https://docs.rs/anno"
documentation = "https://docs.rs/anno"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
regex = "1"
chrono = { version = "0.4", features = ["serde"] }
log = "0.4"
once_cell = "1"
bitflags = "2"

# CLI dependencies
clap = { version = "4", features = ["derive", "env", "wrap_help"] }
clap_complete = "4"
is-terminal = "0.4"
glob = "0.3"
indicatif = "0.17"
toml = "0.8"

# Evaluation
rand = "0.9"
ureq = { version = "2", features = ["json"] }
sha2 = "0.10"
dirs = "5"

# ML backends (not optional in workspace - individual crates can make them optional)
ort = "2.0.0-rc.10"
tokenizers = "0.22"
hf-hub = "0.4"
ndarray = "0.16"
lru = "0.12"
candle-core = "0.9"
candle-nn = "0.9"
candle-transformers = "0.9"
safetensors = "0.4"

# Burn ML framework (training + inference, WebGPU support)
burn = "0.16"
burn-ndarray = "0.16"
burn-tch = "0.16"
burn-wgpu = "0.16"
burn-autodiff = "0.16"

# Async
tokio = { version = "1", features = ["rt", "sync"] }
futures = "0.3"

# Performance
crossbeam-channel = "0.5"
parking_lot = "0.12"
rayon = "1"

# Utilities
itertools = "0.14"
smallvec = { version = "1.13", features = ["serde"] }
dashmap = "6"
unicode-normalization = "0.1.25"
rusqlite = { version = "0.32", features = ["bundled"] }

# Observability
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Testing
proptest = "1"
criterion = { version = "0.5", features = ["html_reports"] }

# Local development overrides - use sibling repos when available
# Comment out for CI or when testing standalone builds
[patch."https://github.com/arclabs561/stratify.git"]
stratify = { path = "../stratify" }

[workspace.lints.rust]
missing_docs = "warn"

[workspace.lints.clippy]
unwrap_used = "warn"
