# Anno Dataset Configuration
# 
# This file defines all datasets available for evaluation and training.
# The loader reads this at runtime, so you can add datasets without recompiling.
#
# Principles:
# - Explicit is better than implicit
# - Metadata enables reproducibility
# - URLs may change; S3 mirrors provide redundancy
# - Training sets are large; test/dev sets are small but sufficient for eval

[meta]
version = "1.0"
last_updated = "2024-12-08"
maintainer = "arc"

# S3 bucket for mirrored datasets (private, owner-only access)
# Naming: arc (global namespace) -> anno (project) -> data
s3_bucket = "s3://arc-anno-data"
s3_prefix = "datasets"

# HuggingFace settings
hf_cache_dir = "${ANNO_CACHE_DIR}/huggingface"
hf_token_env = "HF_TOKEN"  # Read from .env or environment

# =============================================================================
# NER Datasets
# =============================================================================

[datasets.conll2003]
name = "CoNLL-2003"
description = "Reuters newswire NER benchmark (PER, ORG, LOC, MISC)"
task = "ner"
languages = ["en", "de"]
entity_types = ["PER", "ORG", "LOC", "MISC"]
license = "DUA"  # Data Use Agreement required
citation = "Tjong Kim Sang and De Meulder, 2003"

[datasets.conll2003.splits]
train = { url = "https://huggingface.co/datasets/eriktks/conll2003/resolve/main/train.txt", size_mb = 3.3, sentences = 14041 }
dev = { url = "https://huggingface.co/datasets/eriktks/conll2003/resolve/main/valid.txt", size_mb = 0.8, sentences = 3250 }
test = { url = "https://huggingface.co/datasets/eriktks/conll2003/resolve/main/test.txt", size_mb = 0.7, sentences = 3453 }

[datasets.conll2003.quality]
annotation_error_rate = 0.07  # ~7% per CleanCoNLL research
cleaned_version = "cleanconll"

# -----------------------------------------------------------------------------

[datasets.ontonotes5]
name = "OntoNotes 5.0"
