[datasets.mahanama]
name = "Mahānāma"
description = "Sanskrit EDL from Mahābhārata epic. First large-scale literary entity resolution for Sanskrit."
task = "entity_linking"
domain = "literature"
languages = ["sa"]
entity_types = ["Person", "Location", "Miscellaneous"]
license = "CC BY 4.0"
citation = "Sarkar et al., EMNLP 2025"
url = "https://github.com/sujoysarkarai/mahanama"
notes = """
Extreme entity resolution challenges:
- 109K mentions, 5.5K entities
- 124.42 avg name forms per major entity (max 1385 for Śiva)
- 47% entity ambiguity (same name → different entities)
- 39% mentions in multi-word tokens (sandhi)
- Character-level boundaries required
- Cross-lingual KB with English descriptions
- CorefUD format, SLP1 encoding
- Best baselines: 51.57% coref F1, 64.19% EL F1
"""

[datasets.mahanama.splits]
train = { url = "https://github.com/sujoysarkarai/mahanama/tree/main/data/mahanama_conllu", size_mb = 50, subchapters = 1688 }
dev = { url = "https://github.com/sujoysarkarai/mahanama/tree/main/data/mahanama_conllu", size_mb = 6, subchapters = 211 }
test = { url = "https://github.com/sujoysarkarai/mahanama/tree/main/data/mahanama_conllu", size_mb = 6, subchapters = 211 }

[datasets.mahanama.statistics]
