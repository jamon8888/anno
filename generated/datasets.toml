[datasets.bookcoref]
name = "BOOKCOREF"
description = "First book-scale coreference benchmark (200k+ tokens avg)"
task = "coreference"
domain = "literature"
languages = ["en"]
license = "CC BY-NC-SA 4.0"
citation = "Martinelli et al., arXiv 2507.12075, 2025"
url = "https://github.com/sapienzanlp/bookcoref"
hf_url = "https://huggingface.co/datasets/sapienzanlp/bookcoref"
notes = """
Book-scale coreference with unprecedented characteristics:
- Average 216,626 tokens/doc (vs 2,105 for LitBank)
- Average 73,432 char pairwise mention distance (vs 1,013 for LitBank)
- 53 full Project Gutenberg novels
- Character-centric annotations (linked to character names)
- Silver (BOOKCOREFsilver) + Gold (BOOKCOREFgold) splits
- Gold: Animal Farm, Pride and Prejudice, Siddhartha (manually annotated)
- Key finding: Systems drop ~15 F1 from windowed to full-book evaluation
- MUC vs CEAFφ4 divergence increases significantly at book scale
"""

[datasets.bookcoref.splits]
silver = { hf_dataset = "sapienzanlp/bookcoref", hf_split = "train", size_mb = 450, docs = 50, tokens = 10800000 }
gold = { hf_dataset = "sapienzanlp/bookcoref", hf_split = "test", size_mb = 12, docs = 3, tokens = 229000 }

[datasets.bookcoref.statistics]
# Per Table 1 in the paper
avg_tokens_per_doc = 216626
avg_mentions_per_doc = 19471
avg_chains_per_doc = 27.4
avg_mentions_per_chain = 870
avg_mention_distance = 73432  # Critical book-scale metric

[datasets.bookcoref.books_gold]
# Manually annotated test books
animal_farm = { author = "George Orwell", tokens = 29853, mentions = 4012 }
pride_and_prejudice = { author = "Jane Austen", tokens = 121869, mentions = 15234 }
siddhartha = { author = "Hermann Hesse", tokens = 77408, mentions = 5598 }

[datasets.bookcoref.evaluation_insights]
# Key findings for Anno's coref evaluation
metric_divergence_threshold = 0.30  # MUC-CEAF gap indicating scale issues
windowed_eval_recommended_above = 10000  # tokens
performance_drop_windowed_to_full = 15.0  # F1 points typical
best_system_book_scale = "Longdoc"  # 67.0 CoNLL-F1 after training
best_system_windowed = "Maverick"  # 82.2 CoNLL-F1 on 1500-token windows

