[package]
name = "anno-cli"
version = "0.2.0"
edition = "2021"
license = "MIT OR Apache-2.0"
repository = "https://github.com/arclabs561/anno"
description = "CLI for anno"
publish = false

[dependencies]
anno = { path = "../anno", version = "0.2.0", default-features = false }
anno-eval = { path = "../anno-eval", version = "0.2.0" }
anno-core = { path = "../anno-core", version = "0.2.0" }
anno-lattix = { path = "../anno-lattix", version = "0.2.0", optional = true }

clap = { workspace = true, features = ["derive", "env", "wrap_help"] }
clap_complete = { workspace = true }
indicatif = { workspace = true }
is-terminal = { workspace = true }
toml = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
log = { workspace = true }
tracing-subscriber = { workspace = true }
ureq = { workspace = true, features = ["json"] }
chrono = { workspace = true }
dirs = { workspace = true }
regex = { workspace = true }
thiserror = { workspace = true }
once_cell = { workspace = true }
glob = { workspace = true }
itertools = { workspace = true }

# Optional: only used by the `anno muxer` DX tooling (behind `eval-advanced`).
muxer = { git = "https://github.com/arclabs561/muxer.git", rev = "620728225daed39d6d6ff79171a294b47cdf4fd3", default-features = false, features = ["serde", "stochastic", "contextual"], optional = true }

# Optional: knowledge-graph substrate for exporting extracted entities/relations.
lattix = { git = "https://github.com/arclabs561/lattix", rev = "19dfa9cba208eed27aa8af966a775a4e1985da3c", default-features = false, optional = true }

xxhash-rust = { version = "0.8.15", features = ["xxh3"] }

[features]
default = ["eval"]
eval = []
eval-advanced = ["eval", "dep:muxer", "anno/eval-advanced", "anno-eval/eval-advanced"]
eval-bias = ["eval", "anno-eval/eval-bias"]
instrument = []
onnx = ["anno/onnx"]
candle = ["anno/candle"]
burn = ["anno/burn"]
discourse = ["anno/discourse", "anno-eval/discourse"]
llm = ["anno/llm"]
# `lattix` is considered part of the broader graph/KG surface (not a separate user-facing feature).
graph = ["anno/graph", "dep:lattix", "dep:anno-lattix"]

[[bin]]
name = "anno"
path = "src/main.rs"

