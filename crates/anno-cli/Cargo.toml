[package]
name = "anno-cli"
version = "0.3.0"
edition = "2021"
license = "MIT OR Apache-2.0"
repository = "https://github.com/arclabs561/anno"
description = "CLI for anno"
publish = false

[dependencies]
anno = { path = "../anno", package = "anno-lib", version = "0.3.0", default-features = false }
anno-eval = { path = "../anno-eval", version = "0.3.0" }
anno-core = { path = "../anno-core", version = "0.3.0" }

clap = { workspace = true, features = ["derive", "env", "wrap_help"] }
clap_complete = { workspace = true }
indicatif = { workspace = true }
is-terminal = { workspace = true }
toml = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
log = { workspace = true }
tracing-subscriber = { workspace = true }
ureq = { workspace = true, features = ["json"] }
chrono = { workspace = true }
dirs = { workspace = true }
regex = { workspace = true }
thiserror = { workspace = true }
once_cell = { workspace = true }
glob = { workspace = true }
itertools = { workspace = true }

# Optional: only used by the `anno sampler` / `anno muxer` DX tooling (behind `eval`).
muxer = { version = "0.3.9", default-features = false, features = ["serde", "stochastic", "contextual"], optional = true }

# Optional: graph/KG export surface.
# anno-graph is the graph/KG adapter crate; it brings in lattix transitively.
anno-graph = { path = "../anno-graph", version = "0.3.0", optional = true }
lattix = { version = "0.1.2", optional = true }

xxhash-rust = { version = "0.8.15", features = ["xxh3"] }
rayon = { workspace = true }

[features]
default = ["onnx"]
# Evaluation + muxer tooling.
eval = ["dep:muxer", "anno/eval", "anno-eval/eval"]
eval-bias = ["eval", "anno-eval/eval-bias"]
instrument = []
onnx = ["anno/onnx"]
candle = ["anno/candle"]
burn = ["anno/burn"]
discourse = ["anno/discourse", "anno-eval/discourse"]
llm = ["anno/llm"]
graph = ["anno/graph", "dep:anno-graph", "dep:lattix"]

[[bin]]
name = "anno"
path = "src/main.rs"

