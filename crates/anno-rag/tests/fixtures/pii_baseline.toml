# Committed per-category recall baselines for the v0.7 anonymization gate.
# Regex-category values (NIR, SIRET, IBAN_FR, PhoneNumber, Email) are
# captured from `cargo test --test pii_regex`; NER-category values
# (Person, Organization, Location) from `cargo bench --bench bench_pii`.
# Both are filled with real numbers during the final build/verify phase.
# The CI gate compares observed recall against these with a 0.98 tolerance.
[recall]
NIR = 1.0000
SIRET = 0.0857
IBAN_FR = 1.0000
PhoneNumber = 0.7429
Email = 1.0000
Person = 0.0
Organization = 0.0
Location = 0.0
