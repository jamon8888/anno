[package]
name = "anno"
version = "0.2.0"
edition = "2021"
description = "Information extraction for Rust: Named Entity Recognition (NER), coreference resolution, and relationship extraction"
license = "MIT OR Apache-2.0"
repository = "https://github.com/arclabs561/anno"
homepage = "https://github.com/arclabs561/anno"
documentation = "https://docs.rs/anno"
keywords = ["ner", "nlp", "information-extraction", "coreference", "rust"]

[dependencies]
anno-core = { path = "../anno-core", version = "0.2.0" }
textprep = { workspace = true }
sketchir = { workspace = true }
clump = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
regex = { workspace = true }
chrono = { workspace = true }
log = { workspace = true }
once_cell = { workspace = true }
bitflags = { workspace = true }
schemars = { version = "0.8", features = ["derive"], optional = true }
gramdex = { git = "https://github.com/arclabs561/gramdex", rev = "bfc60c7b6965bec4bb176f58b0c02abc0aa2a5b3", optional = true }

rand = { workspace = true }
ureq = { workspace = true, optional = true }
dirs = { workspace = true }

# ML
# `ort`'s ndarray interop is feature-gated in newer releases.
ort = { workspace = true, features = ["ndarray"], optional = true }
tokenizers = { workspace = true, optional = true }
hf-hub = { workspace = true, optional = true }
ndarray = { workspace = true, optional = true }
lru = { workspace = true, optional = true }
candle-core = { workspace = true, optional = true }
candle-nn = { workspace = true, optional = true }
candle-transformers = { workspace = true, optional = true }
safetensors = { workspace = true, optional = true }

# Async
tokio = { workspace = true, optional = true }
futures = { workspace = true, optional = true }

# Performance
crossbeam-channel = { workspace = true, optional = true }
parking_lot = { workspace = true, optional = true }

# Utilities
itertools = { workspace = true }
smallvec = { workspace = true }
dashmap = { workspace = true }
unicode-normalization = { workspace = true }

# Observability
tracing = { workspace = true, optional = true }
tracing-subscriber = { workspace = true, optional = true }

[dev-dependencies]
proptest = { workspace = true }
tempfile = "3"
criterion = { workspace = true }

[features]
default = ["onnx"]
discourse = []
# Legacy name: this gate historically meant “evaluation-ish / research modules”.
# Prefer `analysis` going forward (kept as an alias to avoid breaking downstreams).
eval = []
analysis = ["eval"]
# Enables evaluation-adjacent tooling (CLI helpers, URL ingestion, etc.).
eval-advanced = ["dep:ureq"]
graph = []
gramdex = ["dep:gramdex"]
schema = ["dep:schemars"]
onnx = ["dep:ort", "dep:ndarray", "dep:tokenizers", "dep:hf-hub", "dep:lru"]
candle = ["dep:candle-core", "dep:candle-nn", "dep:candle-transformers", "dep:safetensors"]
metal = ["candle"]
cuda = ["candle"]
burn = []
semantic-chunking = []
async-inference = ["dep:tokio", "dep:futures"]
session-pool = ["dep:crossbeam-channel"]
subsume = []
instrument = ["dep:tracing"]
llm = ["dep:ureq"]
fast-lock = ["dep:parking_lot"]
jiff-time = []

production = ["async-inference", "session-pool", "fast-lock", "instrument"]

# Convenience umbrella.
full = ["onnx", "candle", "discourse", "graph"]

# Workspace-local convenience: enable local `gramdex` integration alongside `full`.
# This is intentionally separate from `full` so external clones aren't forced to have
# `../gramdex` available.
full-workspace = ["full", "gramdex"]

# Stub features referenced behind cfg gates.
unicode-normalization = []
