[package]
name = "anno"
version = "0.2.0"
edition = "2021"
description = "Information extraction for Rust: Named Entity Recognition (NER), coreference resolution, and relationship extraction"
license = "MIT OR Apache-2.0"
repository = "https://github.com/arclabs561/anno"
homepage = "https://github.com/arclabs561/anno"
documentation = "https://docs.rs/anno"
keywords = ["ner", "nlp", "information-extraction", "coreference", "rust"]

[dependencies]
anno-core = { path = "../anno-core", version = "0.2.0" }
anno-coalesce = { path = "../anno-coalesce", version = "0.2.0" }
textprep = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
regex = { workspace = true }
chrono = { workspace = true }
log = { workspace = true }
once_cell = { workspace = true }
bitflags = { workspace = true }

# CLI
clap = { workspace = true, optional = true }
clap_complete = { workspace = true, optional = true }
indicatif = { workspace = true, optional = true }
xxhash-rust = { version = "0.8.15", features = ["xxh3"], optional = true }
toml = { workspace = true, optional = true }

# Evaluation
rand = { workspace = true }
ureq = { workspace = true }
sha2 = { workspace = true }
dirs = { workspace = true }
glob = { workspace = true, optional = true }
rayon = { workspace = true, optional = true }

# ML
ort = { workspace = true }
tokenizers = { workspace = true }
hf-hub = { workspace = true }
ndarray = { workspace = true }
lru = { workspace = true }
candle-core = { workspace = true }
candle-nn = { workspace = true }
candle-transformers = { workspace = true }
safetensors = { workspace = true }

# Async
tokio = { workspace = true }
futures = { workspace = true }

# Utilities
itertools = { workspace = true }
smallvec = { workspace = true }
dashmap = { workspace = true }
unicode-normalization = { workspace = true }
rusqlite = { workspace = true }

# Observability
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

[dev-dependencies]
proptest = { workspace = true }

[features]
default = ["cli", "onnx"]
discourse = []
cli = ["dep:clap", "dep:clap_complete", "dep:indicatif", "dep:xxhash-rust"]
eval = ["dep:toml"]
eval-bias = ["eval"]
eval-advanced = ["eval", "dep:glob"]
eval-parallel = ["eval", "dep:rayon"]
eval-profiling = ["eval"]
onnx = []
candle = []
burn = []
semantic-chunking = []
async-inference = []
session-pool = []
subsume = []
instrument = []
llm = []
fast-lock = []
jiff-time = []

# Stub features referenced behind cfg gates.
rank-eval = ["eval"]
unicode-normalization = []

[[bin]]
name = "anno"
path = "bin/anno.rs"
required-features = ["cli"]
