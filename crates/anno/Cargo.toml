[package]
name = "anno-lib"
version = "0.2.0"
edition = "2021"
description = "Information extraction for Rust: Named Entity Recognition (NER), coreference resolution, and structured extraction"
license = "MIT OR Apache-2.0"
repository = "https://github.com/arclabs561/anno"
homepage = "https://github.com/arclabs561/anno"
documentation = "https://docs.rs/anno"
readme = "../../README.md"
keywords = ["ner", "nlp", "information-extraction", "coreference", "rust"]
categories = ["text-processing"]
publish = false

[lib]
name = "anno"

[dependencies]
anno-core = { path = "../anno-core", version = "0.2.0" }
anno-metrics = { path = "../anno-metrics", version = "0.2.0", optional = true }
textprep = { workspace = true }
sketchir = { workspace = true }
clump = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
regex = { workspace = true }
chrono = { workspace = true }
log = { workspace = true }
once_cell = { workspace = true }
bitflags = { workspace = true }
schemars = { version = "0.8", features = ["derive"], optional = true }
gramdex = { version = "0.1.0", optional = true }

rand = { workspace = true }
ureq = { workspace = true, optional = true }
dirs = { workspace = true }

# ML
# `ort`'s ndarray interop is feature-gated in newer releases.
ort = { workspace = true, features = ["ndarray"], optional = true }
tokenizers = { workspace = true, optional = true }
hf-hub = { workspace = true, optional = true }
ndarray = { workspace = true, optional = true }
lru = { workspace = true, optional = true }
candle-core = { workspace = true, optional = true }
candle-nn = { workspace = true, optional = true }
candle-transformers = { workspace = true, optional = true }
safetensors = { workspace = true, optional = true }

# Async
tokio = { workspace = true, optional = true }
futures = { workspace = true, optional = true }

# Performance
crossbeam-channel = { workspace = true, optional = true }
parking_lot = { workspace = true, optional = true }

# Utilities
itertools = { workspace = true }
smallvec = { workspace = true }
dashmap = { workspace = true }
unicode-normalization = { workspace = true }

# Observability
tracing = { workspace = true, optional = true }
tracing-subscriber = { workspace = true, optional = true }

[dev-dependencies]
proptest = { workspace = true }
tempfile = "3"
criterion = { workspace = true }

[features]
default = ["onnx"]
discourse = []
# Metrics-only analysis helpers (preferred for research / diagnostics).
analysis = ["dep:anno-metrics"]
# Evaluation-adjacent tooling (URL ingestion, cache helpers, etc.).
#
# This is intentionally an umbrella: it includes `analysis` and adds network support.
eval = ["analysis", "dep:ureq"]
graph = []
gramdex = ["dep:gramdex"]
schema = ["dep:schemars", "anno-core/schema"]
onnx = ["dep:ort", "dep:ndarray", "dep:tokenizers", "dep:hf-hub", "dep:lru"]
candle = [
  "dep:candle-core",
  "dep:candle-nn",
  "dep:candle-transformers",
  "dep:safetensors",
  "dep:tokenizers",
  "dep:hf-hub",
]
metal = ["candle"]
cuda = ["candle"]
burn = []
semantic-chunking = []
async-inference = ["dep:tokio", "dep:futures"]
session-pool = ["dep:crossbeam-channel"]
subsume = []
instrument = ["dep:tracing"]
llm = ["dep:ureq"]
fast-lock = ["dep:parking_lot"]
jiff-time = []

production = ["async-inference", "session-pool", "fast-lock", "instrument"]

# Convenience umbrella.
full = ["onnx", "candle", "discourse", "graph"]

# Workspace-local convenience: enable local `gramdex` integration alongside `full`.
# This is intentionally separate from `full` so external clones aren't forced to have
# `../gramdex` available.
full-workspace = ["full", "gramdex"]

# Bundled classical assets (opt-in).
#
# These features exist to prevent model assets from being embedded into binaries unless the
# caller explicitly enables them. This keeps default builds minimal and avoids surprising
# redistribution of large artifacts.
bundled-crf-weights = []
bundled-hmm-params = []

# Stub features referenced behind cfg gates.
unicode-normalization = []
