services:
  anno-rag:
    image: anno-rag:latest
    build:
      context: .
      dockerfile: Dockerfile
    stdin_open: true   # keeps stdio open for MCP transport
    tty: false
    environment:
      # Required: passphrase used to derive the vault encryption key.
      # Change this to a strong secret before using in production.
      ANNO_RAG_VAULT_PASSPHRASE: ${ANNO_RAG_VAULT_PASSPHRASE:?Set ANNO_RAG_VAULT_PASSPHRASE in .env or environment}
    volumes:
      # Persistent data: LanceDB index, vault.enc, processed outputs.
      # Named volume keeps data across container restarts.
      - anno-data:/data
    restart: unless-stopped

volumes:
  anno-data:
